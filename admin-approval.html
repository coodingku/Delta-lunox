<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Lunox | Admin Approval 🛡️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; }
        .card-request { background: #1e293b; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
        .status-badge { font-size: 8px; padding: 2px 8px; border-radius: 10px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase">Stock Approval</h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">Otorisasi Keluar Barang</p>
            </div>
            <button onclick="fetchRequests()" class="bg-slate-800 p-3 rounded-xl hover:bg-slate-700">
                <i class="fas fa-sync-alt text-blue-400"></i>
            </button>
        </div>

        <div id="request-container" class="space-y-4">
            <div class="text-center py-20 text-slate-500 font-bold uppercase text-[10px] tracking-widest">
                Memuat antrean persetujuan...
            </div>
        </div>
    </div>

<script>
    async function fetchRequests() {
        const container = document.getElementById('request-container');
        
        const { data, error } = await supabaseClient
            .from('stock_transfers')
            .select('*')
            .eq('status', 'pending')
            .order('created_at', { ascending: false });

        if (error) return console.error(error);
        
        if (data.length === 0) {
            container.innerHTML = `<div class="text-center py-20 text-slate-500 font-bold uppercase text-[10px] tracking-widest">Tidak ada permintaan pending ☕</div>`;
            return;
        }

        container.innerHTML = data.map(req => `
            <div class="card-request p-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <span class="status-badge bg-amber-500/20 text-amber-500">Pending Approval</span>
                        <span class="text-[9px] text-slate-500 font-bold">${new Date(req.created_at).toLocaleString('id-ID')}</span>
                    </div>
                    <h3 class="text-sm font-black uppercase text-slate-200">${req.product_name}</h3>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">
                        Jumlah: <span class="text-white">${req.qty}</span> | 
                        Tujuan: <span class="text-blue-400">${req.target_loc.toUpperCase()}</span>
                    </p>
                </div>
                
                <div class="flex gap-2 w-full md:w-auto">
                    <button onclick="handleApproval('${req.id}', 'rejected')" class="flex-1 md:flex-none px-4 py-2 bg-red-500/10 text-red-500 rounded-xl text-[10px] font-black uppercase hover:bg-red-500 hover:text-white transition-all">
                        Reject
                    </button>
                    <button onclick="handleApproval('${req.id}', 'approved')" class="flex-1 md:flex-none px-6 py-2 bg-green-500 text-white rounded-xl text-[10px] font-black uppercase shadow-lg shadow-green-900/20 hover:scale-105 active:scale-95 transition-all">
                        Approve & Cut Stock
                    </button>
                </div>
            </div>
        `).join('');
    }

    async function handleApproval(requestId, action) {
        if (!confirm(`Yakin ingin ${action} permintaan ini?`)) return;

        try {
            if (action === 'approved') {
                // 1. Ambil detail request
                const { data: req } = await supabaseClient
                    .from('stock_transfers')
                    .select('*')
                    .eq('id', requestId)
                    .single();

                const targetCol = `stok_${req.target_loc}`;

                // 2. Ambil stok produk saat ini
                const { data: prod } = await supabaseClient
                    .from('products')
                    .select(`stok_gudang, ${targetCol}`)
                    .eq('id', req.product_id)
                    .single();

                // 3. Update Stok di tabel Products (PROSES PEMOTONGAN SEBENARNYA)
                const { error: updateError } = await supabaseClient
                    .from('products')
                    .update({
                        stok_gudang: (prod.stok_gudang || 0) - req.qty,
                        [targetCol]: (prod[targetCol] || 0) + req.qty
                    })
                    .eq('id', req.product_id);

                if (updateError) throw updateError;
            }

            // 4. Update status di tabel stock_transfers (menghilangkan dari antrean)
            await supabaseClient
                .from('stock_transfers')
                .update({ status: action })
                .eq('id', requestId);

            alert(`Berhasil di-${action}!`);
            fetchRequests();

        } catch (err) {
            alert("Gagal: " + err.message);
        }
    }

    // Load data pertama kali
    fetchRequests();
</script>
</body>
</html>
