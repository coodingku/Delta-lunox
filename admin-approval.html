<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Lunox | Admin Approval 🛡️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .sidebar { transition: all 0.3s; width: 280px; background: #0f172a; flex-shrink: 0; }
        .nav-link { transition: all 0.2s; color: #94a3b8; border-radius: 15px; }
        .nav-link:hover, .nav-link.active { background: #1e293b; color: white; }
        
        .card-request { background: white; border-radius: 24px; border: 1px solid rgba(0,0,0,0.05); transition: all 0.3s; }
        .card-request:hover { transform: translateY(-2px); border-color: #3b82f6; }
        .status-badge { font-size: 8px; padding: 2px 8px; border-radius: 10px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="sidebar hidden lg:flex flex-col p-6 overflow-y-auto">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/40">
                <i class="fas fa-gem text-white"></i>
            </div>
            <h2 class="text-white font-black text-xl tracking-tighter uppercase">Delta Lunox</h2>
        </div>

        <nav class="space-y-2 flex-grow">
            <a href="dashboard.html" class="nav-link flex items-center gap-4 p-4 text-xs font-bold uppercase tracking-widest">
                <i class="fas fa-th-large w-5"></i> Dashboard
            </a>
            <a href="admin-approval.html" class="nav-link active flex items-center gap-4 p-4 text-xs font-bold uppercase tracking-widest">
                <i class="fas fa-check-circle w-5"></i> Approval
                <span id="badge-pending" class="ml-auto bg-pink-600 text-[8px] text-white px-2 py-1 rounded-full hidden">0</span>
            </a>
            <a href="gudang-scan.html" class="nav-link flex items-center gap-4 p-4 text-xs font-bold uppercase tracking-widest">
                <i class="fas fa-exchange-alt w-5"></i> Transfer Stok
            </a>
            <a href="kasir.html" class="nav-link flex items-center gap-4 p-4 text-xs font-bold uppercase tracking-widest">
                <i class="fas fa-cash-register w-5"></i> Kasir POS
            </a>
            <div class="pt-4 pb-2 text-[10px] font-black text-slate-600 uppercase tracking-widest px-4">Master Data</div>
            <a href="products.html" class="nav-link flex items-center gap-4 p-4 text-xs font-bold uppercase tracking-widest">
                <i class="fas fa-box w-5"></i> Inventaris
            </a>
        </nav>

        <div class="mt-auto pt-6 border-t border-slate-800 px-2 text-left">
            <p class="text-[9px] font-bold text-slate-500 uppercase">Current User</p>
            <p class="text-xs font-black text-white uppercase mt-1">Sys Admin</p>
        </div>
    </aside>

    <main class="flex-grow p-6 lg:p-10">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl lg:text-3xl font-black tracking-tight uppercase">Stock Approval</h1>
                <p class="text-slate-400 text-[11px] font-bold uppercase tracking-[0.2em]">Otorisasi Keluar Barang</p>
            </div>
            <button onclick="fetchRequests()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm text-slate-400 hover:text-blue-500 transition">
                <i class="fas fa-sync-alt"></i>
            </button>
        </header>

        <div id="request-container" class="max-w-3xl space-y-4">
            <div class="text-center py-20 text-slate-400 font-bold uppercase text-[10px] tracking-widest bg-white rounded-3xl border border-dashed border-slate-200">
                Memuat antrean persetujuan...
            </div>
        </div>
    </main>

<script>
    async function fetchRequests() {
        const container = document.getElementById('request-container');
        
        const { data, error } = await supabaseClient
            .from('stock_transfers')
            .select('*')
            .eq('status', 'pending')
            .order('created_at', { ascending: false });

        if (error) return console.error(error);
        
        // Update badge sidebar
        const badge = document.getElementById('badge-pending');
        if (data.length > 0) {
            badge.innerText = data.length;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
        
        if (data.length === 0) {
            container.innerHTML = `
                <div class="text-center py-20 text-slate-400 font-bold uppercase text-[10px] tracking-widest bg-white rounded-3xl border border-dashed border-slate-200">
                    Tidak ada permintaan pending ☕
                </div>`;
            return;
        }

        container.innerHTML = data.map(req => `
            <div class="card-request p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 shadow-sm">
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <span class="status-badge bg-amber-100 text-amber-600">Pending Approval</span>
                        <span class="text-[9px] text-slate-400 font-bold uppercase">${new Date(req.created_at).toLocaleString('id-ID')}</span>
                    </div>
                    <h3 class="text-sm font-black uppercase text-slate-800">${req.product_name}</h3>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">
                        Qty: <span class="text-slate-900">${req.qty}</span> | 
                        Ke Unit: <span class="text-blue-600">${req.target_loc.toUpperCase()}</span>
                    </p>
                </div>
                
                <div class="flex gap-2 w-full md:w-auto">
                    <button onclick="handleApproval('${req.id}', 'rejected')" class="flex-1 md:flex-none px-4 py-2 bg-slate-100 text-slate-500 rounded-xl text-[10px] font-black uppercase hover:bg-red-50 hover:text-white transition-all">
                        Reject
                    </button>
                    <button onclick="handleApproval('${req.id}', 'approved')" class="flex-1 md:flex-none px-6 py-2 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase shadow-lg shadow-blue-900/20 hover:bg-blue-700 active:scale-95 transition-all">
                        Approve & Cut Stock
                    </button>
                </div>
            </div>
        `).join('');
    }

    async function handleApproval(requestId, action) {
        if (!confirm(`Yakin ingin ${action} permintaan ini?`)) return;

        try {
            if (action === 'approved') {
                const { data: req } = await supabaseClient
                    .from('stock_transfers')
                    .select('*')
                    .eq('id', requestId)
                    .single();

                const targetCol = `stok_${req.target_loc}`;

                const { data: prod } = await supabaseClient
                    .from('products')
                    .select(`stok_gudang, ${targetCol}`)
                    .eq('id', req.product_id)
                    .single();

                const { error: updateError } = await supabaseClient
                    .from('products')
                    .update({
                        stok_gudang: (prod.stok_gudang || 0) - req.qty,
                        [targetCol]: (prod[targetCol] || 0) + req.qty
                    })
                    .eq('id', req.product_id);

                if (updateError) throw updateError;
            }

            await supabaseClient
                .from('stock_transfers')
                .update({ status: action })
                .eq('id', requestId);

            fetchRequests();

        } catch (err) {
            alert("Gagal: " + err.message);
        }
    }

    fetchRequests();
</script>
</body>
</html>
