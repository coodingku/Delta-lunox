<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delta Lunox | Finex POS System 💎</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script> <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .card-premium { background: white; border-radius: 35px; border: 1px solid rgba(0,0,0,0.05); transition: all 0.3s ease; }
        #reader { border: none !important; border-radius: 25px; overflow: hidden; }
        /* Custom Button Style */
        .btn-primary { background: #1e293b; color: white; border-radius: 20px; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="glass-nav sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex flex-col">
            <h1 class="text-xl font-black text-slate-800 tracking-tighter uppercase">Delta Lunox</h1>
            <p class="text-[9px] font-bold text-blue-500 uppercase tracking-[0.3em]">Finex POS System</p>
        </div>
        <div class="flex gap-2">
            <div id="status-db" class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
            <span class="text-[10px] font-black text-slate-400 uppercase">System Online</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 space-y-6">
            <div class="card-premium p-6 shadow-xl shadow-slate-200/50">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-black text-slate-800 uppercase text-sm tracking-widest">QR Scanner POS</h3>
                    <i class="fas fa-qrcode text-blue-500"></i>
                </div>
                <div id="reader" class="bg-slate-100"></div>
                <p class="text-[10px] text-center mt-4 text-slate-400 font-bold uppercase tracking-widest animate-pulse">Arahkan Kamera ke Kode Produk</p>
            </div>

            <div class="card-premium p-8 shadow-lg shadow-slate-100">
                <h3 class="font-black text-slate-800 uppercase text-sm tracking-widest mb-6 border-b pb-2">Add New Inventory</h3>
                <div class="space-y-4">
                    <input type="text" id="p_name" placeholder="Product Name" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-xs font-semibold focus:ring-2 focus:ring-blue-500 outline-none">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="p_sku" placeholder="SKU Code" class="bg-slate-50 border-none p-4 rounded-2xl text-xs font-semibold outline-none">
                        <input type="text" id="p_qr" placeholder="QR String" class="bg-slate-50 border-none p-4 rounded-2xl text-xs font-semibold outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="p_price" placeholder="Retail Price" class="bg-slate-50 border-none p-4 rounded-2xl text-xs font-semibold outline-none">
                        <input type="number" id="p_stock" placeholder="Initial Stock" class="bg-slate-50 border-none p-4 rounded-2xl text-xs font-semibold outline-none">
                    </div>
                    <button onclick="saveProduct()" class="w-full btn-primary py-4 text-[10px] font-black uppercase tracking-widest shadow-lg shadow-slate-200">
                        Update Database ✨
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7">
            <div class="card-premium p-8 shadow-2xl shadow-slate-200 flex flex-col h-full min-h-[600px]">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h3 class="text-xl font-black text-slate-800 tracking-tight uppercase">Checkout Terminal</h3>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Delta Lunox Transaction Hub</p>
                    </div>
                    <button onclick="clearCart()" class="text-[9px] font-black text-red-400 uppercase tracking-widest hover:text-red-600 transition">Reset Cart</button>
                </div>

                <div id="cart-list" class="flex-grow space-y-4 overflow-y-auto no-scrollbar max-h-[400px]">
                    <div class="text-center py-20">
                        <i class="fas fa-shopping-basket text-slate-200 text-4xl mb-4"></i>
                        <p class="text-[10px] font-bold text-slate-300 uppercase tracking-widest">Keranjang Kosong</p>
                    </div>
                </div>

                <div class="mt-8 pt-8 border-t border-dashed border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Total Amount</span>
                        <span id="total-price" class="text-3xl font-black text-slate-800 tracking-tighter">Rp 0</span>
                    </div>
                    <button onclick="checkout()" class="w-full bg-[#f72585] hover:bg-pink-600 text-white py-5 rounded-[25px] text-xs font-black uppercase tracking-[0.2em] shadow-xl shadow-pink-100 transition-all active:scale-95">
                        Proses Transaksi & Potong Stok 🌸
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Menggunakan variabel 'db' yang berasal dari supabase-online.js anda
        let cart = [];

        async function saveProduct() {
            const product = {
                nama_barang: document.getElementById('p_name').value, // Menyesuaikan nama kolom tabel anda
                sku: document.getElementById('p_sku').value,
                qr_code: document.getElementById('p_qr').value,
                harga_jual: parseInt(document.getElementById('p_price').value),
                stok_sekarang: parseInt(document.getElementById('p_stock').value),
                tampil_online: true
            };

            const { error } = await db.from('produk').insert([product]);
            if (error) alert("Error: " + error.message);
            else {
                alert("Inventory Updated!");
                location.reload();
            }
        }

        function onScanSuccess(decodedText) {
            findProduct(decodedText);
        }

        async function findProduct(qrCode) {
            const { data, error } = await db.from('produk').select('*').eq('qr_code', qrCode).single();
            if (data) {
                cart.push(data);
                updateCartUI();
                // Play sound logic bisa ditambah di sini
            }
        }

        function updateCartUI() {
            const list = document.getElementById('cart-list');
            list.innerHTML = "";
            let total = 0;

            if (cart.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-slate-300 font-bold uppercase text-[10px]">Keranjang Kosong</div>`;
            }

            cart.forEach((item, index) => {
                total += item.harga_jual;
                list.innerHTML += `
                    <div class="flex justify-between items-center p-5 bg-slate-50 rounded-[25px] border border-white shadow-sm transition hover:shadow-md">
                        <div class="flex flex-col">
                            <span class="text-[11px] font-black text-slate-700 uppercase leading-tight">${item.nama_barang}</span>
                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">${item.sku}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-black text-slate-800 text-sm">Rp ${item.harga_jual.toLocaleString()}</span>
                            <button onclick="removeItem(${index})" class="w-8 h-8 rounded-full bg-white text-red-400 flex items-center justify-center shadow-sm hover:bg-red-500 hover:text-white transition">
                                <i class="fas fa-times text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('total-price').innerText = "Rp " + total.toLocaleString();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function clearCart() {
            cart = [];
            updateCartUI();
        }

        async function checkout() {
            if (cart.length === 0) return alert("Scan produk terlebih dahulu!");

            const total = cart.reduce((acc, curr) => acc + curr.harga_jual, 0);

            // Simpan Transaksi
            const { data: trans, error: tErr } = await db.from('transactions').insert([{ total_amount: total }]).select().single();
            if (tErr) return alert(tErr.message);

            // Simpan Detail & Trigger otomatis potong stok (Pastikan table transaction_items tersedia)
            const items = cart.map(i => ({ transaction_id: trans.id, product_id: i.id, quantity: 1, subtotal: i.harga_jual }));
            const { error: iErr } = await db.from('transaction_items').insert(items);

            if (!iErr) {
                alert("Transaksi Berhasil! Stok telah diperbarui di Database BeautyBloom.");
                cart = [];
                updateCartUI();
            }
        }

        const scanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
        scanner.render(onScanSuccess);
    </script>
</body>
</html>
