<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delta Lunox | Finex POS System 💎</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script> 
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .card-premium { background: white; border-radius: 35px; border: 1px solid rgba(0,0,0,0.05); transition: all 0.3s ease; }
        #reader { border: none !important; border-radius: 25px; overflow: hidden; }
        .btn-primary { background: #1e293b; color: white; border-radius: 20px; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="glass-nav sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex flex-col">
            <h1 class="text-xl font-black text-slate-800 tracking-tighter uppercase">Delta Lunox</h1>
            <p class="text-[9px] font-bold text-blue-500 uppercase tracking-[0.3em]">Finex POS System</p>
        </div>
        <div class="flex gap-2 items-center">
            <div id="status-db" class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
            <span class="text-[10px] font-black text-slate-400 uppercase">System Online</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 space-y-6">
            <div class="card-premium p-6 shadow-xl shadow-slate-200/50">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-black text-slate-800 uppercase text-sm tracking-widest">QR Scanner POS</h3>
                    <i class="fas fa-qrcode text-blue-500"></i>
                </div>
                <div id="reader" class="bg-slate-100"></div>
                <p class="text-[10px] text-center mt-4 text-slate-400 font-bold uppercase tracking-widest animate-pulse">Arahkan Kamera ke Kode Produk (Contoh: 0001)</p>
            </div>

            <div class="card-premium p-8 shadow-lg shadow-slate-100">
                <h3 class="font-black text-slate-800 uppercase text-sm tracking-widest mb-6 border-b pb-2">Registrasi Produk Baru</h3>
                <div class="space-y-4">
                    <input type="text" id="p_name" placeholder="Nama Produk" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-xs font-semibold outline-none">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="p_sku" placeholder="SKU (Contoh: SKU001)" class="bg-slate-50 border-none p-4 rounded-2xl text-xs font-semibold outline-none">
                        <input type="text" id="p_qr" placeholder="Kode QR (Contoh: 0001)" class="bg-slate-50 border-none p-4 rounded-2xl text-xs font-semibold outline-none text-pink-500 font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="p_price" placeholder="Harga Jual" class="bg-slate-50 border-none p-4 rounded-2xl text-xs font-semibold outline-none">
                        <input type="number" id="p_stock" placeholder="Stok Awal" class="bg-slate-50 border-none p-4 rounded-2xl text-xs font-semibold outline-none">
                    </div>
                    <button onclick="saveProduct()" class="w-full btn-primary py-4 text-[10px] font-black uppercase tracking-widest shadow-lg shadow-slate-200">
                        Simpan ke Database ✨
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7">
            <div class="card-premium p-8 shadow-2xl shadow-slate-200 flex flex-col h-full min-h-[600px]">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h3 class="text-xl font-black text-slate-800 tracking-tight uppercase">Checkout Terminal</h3>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Delta Lunox Transaction Hub</p>
                    </div>
                    <button onclick="clearCart()" class="text-[9px] font-black text-red-400 uppercase tracking-widest hover:text-red-600 transition">Reset Cart</button>
                </div>

                <div id="cart-list" class="flex-grow space-y-4 overflow-y-auto no-scrollbar max-h-[400px]">
                    <div class="text-center py-20 text-slate-300 font-bold uppercase text-[10px]">Keranjang Kosong</div>
                </div>

                <div class="mt-8 pt-8 border-t border-dashed border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Total Amount</span>
                        <span id="total-price" class="text-3xl font-black text-slate-800 tracking-tighter">Rp 0</span>
                    </div>
                    <button onclick="checkout()" class="w-full bg-[#f72585] hover:bg-pink-600 text-white py-5 rounded-[25px] text-xs font-black uppercase tracking-[0.2em] shadow-xl shadow-pink-100 transition-all active:scale-95">
                        Proses Transaksi & Potong Stok 🌸
                    </button>
                </div>
            </div>
        </div>
    </main>

<script>
    let cart = [];
    let isScanning = false; // Pengunci agar tidak double scan

    // 1. INPUT PRODUK BARU
    async function saveProduct() {
        const nameValue = document.getElementById('p_name').value;
        const skuValue = document.getElementById('p_sku').value;
        const qrValue = document.getElementById('p_qr').value;
        const priceValue = parseFloat(document.getElementById('p_price').value) || 0;
        const stockValue = parseInt(document.getElementById('p_stock').value) || 0;

        if(!nameValue || !qrValue || !skuValue) return alert("Mohon isi semua data!");

        const { error } = await supabaseClient
            .from('products') 
            .insert([{
                name: nameValue,
                sku: skuValue,
                qr_code: qrValue,
                price: priceValue,
                stock: stockValue
            }]);

        if (error) {
            alert("Error: " + error.message);
        } else {
            alert("Produk " + nameValue + " Berhasil Disimpan!");
            // Reset form tanpa reload
            document.getElementById('p_name').value = "";
            document.getElementById('p_sku').value = "";
            document.getElementById('p_qr').value = "";
            document.getElementById('p_price').value = "";
            document.getElementById('p_stock').value = "";
        }
    }

    // 2. SCAN & CARI PRODUK OTOMATIS
    async function findProduct(qrCode) {
        if(isScanning) return; // Jika sedang proses cari, abaikan scan baru
        isScanning = true;

        const { data, error } = await supabaseClient
            .from('products')
            .select('*')
            .eq('qr_code', qrCode)
            .single();

        if (data) {
            cart.push(data);
            updateCartUI();
            console.log("Berhasil menambah: " + data.name);
        } else {
            console.log("Kode " + qrCode + " tidak ada di database.");
        }

        // Buka kunci scan setelah 1.5 detik agar user bisa scan barang berikutnya
        setTimeout(() => { isScanning = false; }, 1500);
    }

    function updateCartUI() {
        const list = document.getElementById('cart-list');
        list.innerHTML = "";
        let total = 0;

        if (cart.length === 0) {
            list.innerHTML = `<div class="text-center py-20 text-slate-300 font-bold uppercase text-[10px]">Keranjang Kosong</div>`;
        }

        cart.forEach((item, index) => {
            total += parseFloat(item.price);
            list.innerHTML += `
                <div class="flex justify-between items-center p-5 bg-slate-50 rounded-[25px] border border-white shadow-sm">
                    <div class="flex flex-col text-left">
                        <span class="text-[11px] font-black text-slate-700 uppercase leading-tight">${item.name}</span>
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">SKU: ${item.sku}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-black text-slate-800 text-sm">Rp ${parseFloat(item.price).toLocaleString()}</span>
                        <button onclick="removeItem(${index})" class="w-8 h-8 rounded-full bg-white text-red-400 flex items-center justify-center shadow-sm">
                            <i class="fas fa-times text-[10px]"></i>
                        </button>
                    </div>
                </div>
            `;
        });
        document.getElementById('total-price').innerText = "Rp " + total.toLocaleString();
    }

    async function checkout() {
        if (cart.length === 0) return alert("Keranjang masih kosong!");
        const totalAmount = cart.reduce((acc, curr) => acc + parseFloat(curr.price), 0);

        const { data: trans, error: tErr } = await supabaseClient
            .from('transactions')
            .insert([{ total_amount: totalAmount, payment_method: 'Tunai' }])
            .select().single();

        if (tErr) return alert(tErr.message);

        const items = cart.map(i => ({ 
            transaction_id: trans.id, 
            product_id: i.id, 
            quantity: 1, 
            subtotal: i.price 
        }));

        const { error: iErr } = await supabaseClient.from('transaction_items').insert(items);

        if (!iErr) {
            alert("Transaksi Sukses! Stok Berkurang 🌸");
            cart = [];
            updateCartUI();
        }
    }

    function removeItem(index) {
        cart.splice(index, 1);
        updateCartUI();
    }

    function clearCart() {
        cart = [];
        updateCartUI();
    }

    function onScanSuccess(decodedText) {
        findProduct(decodedText);
    }

    // Inisialisasi Scanner (Optimalkan untuk HP)
    const scanner = new Html5QrcodeScanner("reader", { 
        fps: 20, 
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0 
    });
    scanner.render(onScanSuccess);
</script>
</body>
</html>
