<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adjustment Stok | Delta Lunox</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .input-focus { transition: all 0.2s; border: 2px solid #e2e8f0; }
        .input-focus:focus { border-color: #3b82f6; outline: none; ring: 2px; }
    </style>
</head>
<body class="p-6 lg:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-slate-800 uppercase">Inventory Adjustment</h1>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">Penyesuaian Stok Per Lokasi</p>
            </div>
            <a href="products.html" class="text-slate-500 hover:text-slate-800 transition text-sm font-bold">
                <i class="fas fa-arrow-left mr-2"></i> Kembali
            </a>
        </header>

        <div class="glass-card p-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <!-- Pilih Produk -->
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-1">Cari Produk (Nama/QR)</label>
                    <div class="relative">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <input type="text" id="searchProduct" onkeyup="searchProduct(this.value)" placeholder="Scan QR atau Ketik Nama..." class="w-full pl-10 pr-4 py-3 rounded-xl input-focus font-bold text-sm">
                        <div id="searchResults" class="absolute w-full bg-white shadow-2xl rounded-xl mt-2 border border-slate-100 hidden z-50 max-h-60 overflow-y-auto"></div>
                    </div>
                </div>

                <!-- Pilih Gudang -->
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-1">Lokasi Gudang</label>
                    <select id="targetWarehouse" class="w-full p-3 rounded-xl input-focus font-bold text-sm bg-white" onchange="updateCurrentStockDisplay()">
                        <option value="stok_gudang">Gudang Utama (Pusat)</option>
                        <option value="stok_store">Store (Retail)</option>
                        <option value="stok_ktv">KTV & Lounge</option>
                        <option value="stok_bar">Bar & Cafe</option>
                    </select>
                </div>
            </div>

            <!-- Info Stok Saat Ini -->
            <div id="stockInfo" class="hidden grid grid-cols-3 gap-4 mb-8 p-6 bg-slate-50 rounded-3xl border border-dashed border-slate-200">
                <div class="text-center">
                    <p class="text-[9px] font-black uppercase text-slate-400">Nama Produk</p>
                    <p id="info_name" class="font-black text-slate-800 text-sm">-</p>
                </div>
                <div class="text-center border-x border-slate-200">
                    <p class="text-[9px] font-black uppercase text-slate-400 text-blue-500">Stok Sistem</p>
                    <p id="info_qty" class="font-black text-blue-600 text-xl">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[9px] font-black uppercase text-slate-400 text-pink-500">QR Code</p>
                    <p id="info_qr" class="font-black text-pink-600 text-sm">-</p>
                </div>
            </div>

            <!-- Form Adjustment -->
            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-1">Tipe Penyesuaian</label>
                        <select id="adj_type" class="w-full p-3 rounded-xl input-focus font-bold text-sm bg-white">
                            <option value="set">Set Stok (Ubah Menjadi...)</option>
                            <option value="add">Tambah (+)</option>
                            <option value="sub">Kurangi (-)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-1">Jumlah Perubahan</label>
                        <input type="number" id="adj_qty" class="w-full p-3 rounded-xl input-focus font-bold text-sm" placeholder="0">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-1">Alasan Penyesuaian</label>
                    <textarea id="adj_note" rows="3" class="w-full p-3 rounded-xl input-focus font-bold text-sm" placeholder="Contoh: Barang Rusak, Salah Input, atau Stok Opname..."></textarea>
                </div>

                <button onclick="processAdjustment()" class="w-full bg-blue-600 hover:bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-[0.2em] transition-all shadow-xl shadow-blue-200">
                    Konfirmasi Penyesuaian Stok
                </button>
            </div>
        </div>
    </div>

    <script>
        let selectedProduct = null;

        async function searchProduct(query) {
            if (query.length < 2) {
                document.getElementById('searchResults').classList.add('hidden');
                return;
            }

            const { data, error } = await supabaseClient
                .from('products')
                .select('*')
                .or(`name.ilike.%${query}%,qr_code.ilike.%${query}%`)
                .limit(5);

            if (data) {
                const results = document.getElementById('searchResults');
                results.innerHTML = data.map(p => `
                    <div onclick='selectProduct(${JSON.stringify(p)})' class="p-4 hover:bg-blue-50 cursor-pointer border-b border-slate-50 transition">
                        <p class="font-black text-xs uppercase text-slate-800">${p.name}</p>
                        <p class="text-[10px] text-slate-400 font-bold">${p.qr_code}</p>
                    </div>
                `).join('');
                results.classList.remove('hidden');
            }
        }

        function selectProduct(product) {
            selectedProduct = product;
            document.getElementById('searchProduct').value = product.name;
            document.getElementById('searchResults').classList.add('hidden');
            document.getElementById('stockInfo').classList.remove('hidden');
            updateCurrentStockDisplay();
        }

        function updateCurrentStockDisplay() {
            if (!selectedProduct) return;
            const warehouse = document.getElementById('targetWarehouse').value;
            
            document.getElementById('info_name').innerText = selectedProduct.name;
            document.getElementById('info_qr').innerText = selectedProduct.qr_code;
            document.getElementById('info_qty').innerText = selectedProduct[warehouse] || 0;
        }

        async function processAdjustment() {
            if (!selectedProduct) return alert("Pilih produk terlebih dahulu!");
            
            const warehouse = document.getElementById('targetWarehouse').value;
            const type = document.getElementById('adj_type').value;
            const inputQty = parseInt(document.getElementById('adj_qty').value);
            const note = document.getElementById('adj_note').value;
            const currentStock = selectedProduct[warehouse] || 0;

            if (isNaN(inputQty)) return alert("Masukkan jumlah penyesuaian!");

            let newQty = 0;
            if (type === 'set') newQty = inputQty;
            else if (type === 'add') newQty = currentStock + inputQty;
            else if (type === 'sub') newQty = currentStock - inputQty;

            if (newQty < 0) return alert("Stok akhir tidak boleh kurang dari 0!");

            // 1. Update Tabel Products
            const { error: updateError } = await supabaseClient
                .from('products')
                .update({ [warehouse]: newQty })
                .eq('id', selectedProduct.id);

            if (updateError) {
                alert("Gagal update stok: " + updateError.message);
                return;
            }

            // 2. Catat Log (Opsional: Jika Anda punya tabel stock_logs)
            // Anda bisa menambahkan fitur log di sini nanti

            alert(`Berhasil! Stok di ${warehouse.replace('_', ' ').toUpperCase()} kini: ${newQty}`);
            location.reload();
        }
    </script>
</body>
</html>
