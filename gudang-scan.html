<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delta Lunox | Warehouse Out 📦</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script> 
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; }
        .card-dark { background: #1e293b; border-radius: 35px; border: 1px solid rgba(255,255,255,0.05); }
        #reader { width: 100%; border-radius: 25px; overflow: hidden; background: #000; aspect-ratio: 1/1; }
        .item-row { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto">
        <div class="flex items-center gap-4 mb-8">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-900/20">
                <i class="fas fa-box-open text-white"></i>
            </div>
            <div>
                <h1 class="text-xl font-black uppercase tracking-tight">Warehouse Out</h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.3em]">Validasi & Potong Stok</p>
            </div>
        </div>

        <div class="card-dark p-6 shadow-2xl">
            <div id="reader" class="mb-6"></div>
            
            <button id="btn-start" onclick="startWarehouseScan()" class="w-full bg-white text-slate-900 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl active:scale-95 transition-all mb-6">
                <i class="fas fa-video mr-2"></i> Aktifkan Kamera Belakang
            </button>

            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Barang Terpindai</h3>
                <span id="scan-count" class="text-[10px] bg-blue-600 px-2 py-0.5 rounded-full font-bold">0</span>
            </div>

            <div id="warehouse-list" class="space-y-3 max-h-[250px] overflow-y-auto pr-2 mb-8">
                <div class="text-center py-10 text-slate-500 text-[10px] font-bold uppercase tracking-widest">Siap memindai barang...</div>
            </div>

            <div class="pt-6 border-t border-slate-700">
                <button onclick="finalizeWarehouseStock()" class="w-full bg-green-500 hover:bg-green-400 text-white py-5 rounded-[25px] font-black uppercase text-xs tracking-[0.2em] shadow-lg shadow-green-900/20 active:scale-95 transition-all">
                    Konfirmasi Keluar Barang ✨
                </button>
                <p class="text-center text-[8px] text-slate-500 mt-4 uppercase font-bold tracking-widest">Stok akan terpotong otomatis setelah konfirmasi</p>
            </div>
        </div>
    </div>

<script>
    let scannedItems = [];
    let isProcessing = false;
    let html5QrCode;

    // Memulai Kamera Belakang
    function startWarehouseScan() {
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 20, qrbox: { width: 250, height: 250 } };

        html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
            if (isProcessing) return;
            isProcessing = true;
            
            // Suara/Getar feedback
            if (navigator.vibrate) navigator.vibrate(100);
            
            handleItemScanned(decodedText);
            
            // Jeda agar tidak scan barang yang sama terlalu cepat
            setTimeout(() => { isProcessing = false; }, 1500);
        })
        .then(() => {
            document.getElementById('btn-start').classList.add('hidden');
        })
        .catch(err => alert("Kamera error: " + err));
    }

    // Proses pencarian barang setelah scan
    async function handleItemScanned(qrCode) {
        const { data, error } = await supabaseClient
            .from('products')
            .select('*')
            .eq('qr_code', qrCode)
            .single();

        if (data) {
            // Tambahkan ke array scan (mendukung multiple scan barang yang sama)
            scannedItems.push({
                id: data.id,
                name: data.name,
                current_stock: data.stock,
                qr: qrCode
            });
            updateWarehouseUI();
        } else {
            console.warn("QR tidak terdaftar di database.");
        }
    }

    function updateWarehouseUI() {
        const list = document.getElementById('warehouse-list');
        document.getElementById('scan-count').innerText = scannedItems.length;
        
        if (scannedItems.length === 0) {
            list.innerHTML = `<div class="text-center py-10 text-slate-500 text-[10px] font-bold uppercase tracking-widest">Siap memindai barang...</div>`;
            return;
        }

        list.innerHTML = scannedItems.map((item, index) => `
            <div class="item-row flex justify-between items-center p-4 rounded-2xl">
                <div class="text-left">
                    <p class="text-[10px] font-black uppercase text-slate-200">${item.name}</p>
                    <p class="text-[8px] font-bold text-slate-500 uppercase">Stok Saat Ini: ${item.current_stock}</p>
                </div>
                <button onclick="removeScanItem(${index})" class="text-red-400 p-2">
                    <i class="fas fa-times text-xs"></i>
                </button>
            </div>
        `).reverse().join(''); // Yang terbaru muncul di atas
    }

    function removeScanItem(index) {
        scannedItems.splice(index, 1);
        updateWarehouseUI();
    }

    // FINAL: POTONG STOK DI DATABASE
    async function finalizeWarehouseStock() {
        if (scannedItems.length === 0) return alert("Belum ada barang yang di-scan!");

        const confirmFinal = confirm(`Konfirmasi pengeluaran ${scannedItems.length} item dari gudang?`);
        if (!confirmFinal) return;

        try {
            // Kelompokkan barang untuk menghitung total pengurangan per ID
            // Contoh: Scan barang A 3 kali, maka stok A dikurangi 3.
            const stockChanges = scannedItems.reduce((acc, item) => {
                acc[item.id] = (acc[item.id] || 0) + 1;
                return acc;
            }, {});

            for (const [productId, qtyToReduce] of Object.entries(stockChanges)) {
                // Ambil stok terbaru dulu dari DB (mencegah data lama)
                const { data: currentProduct } = await supabaseClient
                    .from('products')
                    .select('stock')
                    .eq('id', productId)
                    .single();

                const newStock = (currentProduct.stock || 0) - qtyToReduce;

                // Update ke Supabase
                const { error } = await supabaseClient
                    .from('products')
                    .update({ stock: newStock })
                    .eq('id', productId);

                if (error) throw error;
            }

            alert("📦 Stok Berhasil Diperbarui! Barang keluar tercatat.");
            scannedItems = [];
            updateWarehouseUI();

        } catch (err) {
            alert("Terjadi kesalahan saat update stok: " + err.message);
        }
    }
</script>
</body>
</html>
