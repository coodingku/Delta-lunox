<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delta Lunox | Stock Transfer System 📦</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script> 
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; }
        .card-dark { background: #1e293b; border-radius: 35px; border: 1px solid rgba(255,255,255,0.05); }
        #reader { width: 100%; border-radius: 25px; overflow: hidden; background: #000; aspect-ratio: 1/1; }
        .dept-btn { transition: all 0.2s ease; border: 2px solid #334155; color: #94a3b8; }
        .dept-btn.active { border-color: #3b82f6; background: #1e40af; color: white; transform: scale(0.98); }
        .item-row { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto">
        <div class="flex items-center gap-4 mb-6">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fas fa-truck-loading text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-black uppercase tracking-tight">Gudang Utama</h1>
                <p class="text-[9px] font-bold text-blue-400 uppercase tracking-widest">Transfer Barang ke Unit</p>
            </div>
        </div>

        <div class="card-dark p-6 mb-6 shadow-xl">
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 text-center">Pilih Unit Tujuan</label>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="setTarget('ktv')" class="dept-btn p-4 rounded-2xl text-[11px] font-black uppercase tracking-widest" id="btn-ktv">KTV</button>
                <button onclick="setTarget('spa')" class="dept-btn p-4 rounded-2xl text-[11px] font-black uppercase tracking-widest" id="btn-spa">SPA</button>
                <button onclick="setTarget('cabana')" class="dept-btn p-4 rounded-2xl text-[11px] font-black uppercase tracking-widest" id="btn-cabana">CABANA</button>
                <button onclick="setTarget('kitchen')" class="dept-btn p-4 rounded-2xl text-[11px] font-black uppercase tracking-widest" id="btn-kitchen">KITCHEN</button>
            </div>
        </div>

        <div class="card-dark p-6 shadow-2xl">
            <div id="reader" class="mb-6 border-2 border-slate-700"></div>
            
            <button id="btn-start" onclick="startScanner()" class="w-full bg-white text-slate-900 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl mb-6">
                <i class="fas fa-qrcode mr-2"></i> Mulai Scan Barang
            </button>

            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="text-[10px] font-black text-slate-500 uppercase">Terpindai</h3>
                <span id="scan-count" class="text-[10px] bg-blue-600 px-3 py-1 rounded-full font-black">0</span>
            </div>

            <div id="warehouse-list" class="space-y-3 max-h-[200px] overflow-y-auto pr-2 mb-8">
                <div class="text-center py-6 text-slate-600 text-[10px] font-bold uppercase tracking-widest">Siap Memindai...</div>
            </div>

            <button onclick="finalizeTransfer()" class="w-full bg-green-500 hover:bg-green-400 text-white py-5 rounded-[25px] font-black uppercase text-xs tracking-[0.2em] shadow-lg shadow-green-900/20 active:scale-95 transition-all">
                Konfirmasi Transfer ✨
            </button>
        </div>
    </div>

<script>
    let scannedItems = [];
    let selectedDept = "";
    let isLocked = false;
    let scanner;

    function setTarget(dept) {
        selectedDept = dept;
        document.querySelectorAll('.dept-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + dept).classList.add('active');
        if (navigator.vibrate) navigator.vibrate(50);
    }

    function startScanner() {
        if (!selectedDept) {
            alert("Harap pilih unit tujuan (KTV/SPA/dll) terlebih dahulu!");
            return;
        }
        
        scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (txt) => {
            if (isLocked) return;
            isLocked = true;
            
            if (navigator.vibrate) navigator.vibrate(100);
            handleScan(txt);
            
            setTimeout(() => { isLocked = false; }, 1500);
        }).then(() => document.getElementById('btn-start').classList.add('hidden'));
    }

    async function handleScan(qrCode) {
        const { data, error } = await supabaseClient
            .from('products')
            .select('id, name, stok_gudang')
            .eq('qr_code', qrCode)
            .single();

        if (data) {
            scannedItems.push({ 
                id: data.id, 
                name: data.name, 
                old_gudang: data.stok_gudang 
            });
            updateUI();
        } else {
            console.error("Produk tidak ditemukan");
        }
    }

    function updateUI() {
        const list = document.getElementById('warehouse-list');
        document.getElementById('scan-count').innerText = scannedItems.length;
        
        if (scannedItems.length === 0) {
            list.innerHTML = `<div class="text-center py-6 text-slate-600 text-[10px] font-bold uppercase tracking-widest">Siap Memindai...</div>`;
            return;
        }

        list.innerHTML = scannedItems.map((item, index) => `
            <div class="item-row flex justify-between items-center p-4 rounded-2xl">
                <div class="text-left">
                    <p class="text-[10px] font-black uppercase text-slate-200">${item.name}</p>
                    <p class="text-[8px] font-bold text-blue-400 uppercase tracking-tighter">Ke: ${selectedDept}</p>
                </div>
                <button onclick="removeItem(${index})" class="text-red-400 p-2"><i class="fas fa-times text-xs"></i></button>
            </div>
        `).reverse().join('');
    }

    function removeItem(index) {
        scannedItems.splice(index, 1);
        updateUI();
    }

    async function finalizeTransfer() {
        if (scannedItems.length === 0) return alert("Scan barang dulu!");
        if (!selectedDept) return alert("Pilih unit tujuan!");

        const confirmTransfer = confirm(`Transfer ${scannedItems.length} barang ke ${selectedDept.toUpperCase()}?`);
        if (!confirmTransfer) return;

        try {
            // Kita hitung total per ID barang yang di-scan
            const summary = scannedItems.reduce((acc, curr) => {
                acc[curr.id] = (acc[curr.id] || 0) + 1;
                return acc;
            }, {});

            const targetColumn = `stok_${selectedDept}`; // Misal: stok_ktv

            for (const [id, qty] of Object.entries(summary)) {
                // 1. Ambil data stok terkini dari DB
                const { data: prod } = await supabaseClient
                    .from('products')
                    .select(`stok_gudang, ${targetColumn}`)
                    .eq('id', id)
                    .single();

                // 2. Lakukan Update (Kurangi Gudang, Tambah Unit)
                const { error } = await supabaseClient
                    .from('products')
                    .update({
                        stok_gudang: (prod.stok_gudang || 0) - qty,
                        [targetColumn]: (prod[targetColumn] || 0) + qty
                    })
                    .eq('id', id);

                if (error) throw error;
            }

            alert("📦 Sukses! Stok " + selectedDept.toUpperCase() + " telah bertambah.");
            scannedItems = [];
            updateUI();
            
        } catch (err) {
            alert("Error: " + err.message);
        }
    }
</script>
</body>
</html>
