<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Stok & Produk | Delta Lunox</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .btn-action { transition: all 0.2s; }
        .btn-action:hover { transform: translateY(-1px); }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 10; border-right: 2px solid #f1f5f9; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-6">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase">Master Data Produk</h1>
                <p class="text-slate-500 font-medium text-sm">Dashboard Pemantauan Stok Global Antar Outlet.</p>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="downloadTemplate()" class="bg-white border border-slate-200 text-slate-700 px-4 py-2.5 rounded-xl text-xs font-bold btn-action shadow-sm">📥 TEMPLATE</button>
                <button onclick="document.getElementById('importFile').click()" class="bg-white border border-slate-200 text-slate-700 px-4 py-2.5 rounded-xl text-xs font-bold btn-action shadow-sm">📤 IMPORT</button>
                <input type="file" id="importFile" class="hidden" accept=".xlsx, .xls" onchange="importExcel(event)">
                <button onclick="exportToExcel()" class="bg-emerald-500 text-white px-4 py-2.5 rounded-xl text-xs font-bold btn-action shadow-lg shadow-emerald-100">📊 EXPORT</button>
                <button onclick="openModal()" class="bg-blue-600 text-white px-4 py-2.5 rounded-xl text-xs font-bold btn-action shadow-lg shadow-blue-100">＋ PRODUK BARU</button>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl border border-slate-200 mb-6 flex gap-4 items-center">
            <div class="relative w-full md:w-96">
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari nama atau kode produk..." class="w-full bg-slate-50 border border-slate-200 p-3 pl-10 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
                <span class="absolute left-3 top-3.5 opacity-30">🔍</span>
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-[10px] uppercase tracking-widest">
                            <th class="px-6 py-4 border-b sticky-col">Produk</th>
                            <th class="px-6 py-4 border-b text-center bg-blue-50/50 text-blue-600">Gudang Utama</th>
                            <th class="px-6 py-4 border-b text-center">Cabana</th>
                            <th class="px-6 py-4 border-b text-center">Delta</th>
                            <th class="px-6 py-4 border-b text-center">KTV</th>
                            <th class="px-6 py-4 border-b text-center">Kitchen</th>
                            <th class="px-6 py-4 border-b text-center text-slate-900">Total Stok</th>
                            <th class="px-6 py-4 border-b text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody" class="text-sm divide-y divide-slate-100 text-slate-700"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modalProduk" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 id="modalTitle" class="font-black text-slate-800 uppercase tracking-tight">Data Produk</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            </div>
            <form id="formProduk" class="p-6 space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Kode Produk</label>
                    <input type="text" id="prodCode" required class="w-full bg-slate-50 border p-3 rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Nama Produk</label>
                    <input type="text" id="prodName" required class="w-full bg-slate-50 border p-3 rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Volume (ML)</label>
                    <input type="number" id="prodMl" required class="w-full bg-slate-50 border p-3 rounded-xl outline-none">
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-600 transition-all">Simpan Data</button>
            </form>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://ziqimmcdfjhhjpcloxzs.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppcWltbWNkZmpoaGpwY2xveHpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNTM2MzIsImV4cCI6MjA5MzYyOTYzMn0.PSWyImlqJZ7F4Gfw5UecmZSHXYQ4Aa-1er5sAEGgcq8';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let rawData = []; // Data asli dari database

    async function fetchStock() {
        const tbody = document.getElementById('stockTableBody');
        tbody.innerHTML = `<tr><td colspan="8" class="text-center py-20 text-slate-400 animate-pulse font-bold uppercase text-xs">Mengkonsolidasi Data...</td></tr>`;

        const { data, error } = await supabaseClient.from('view_stock_monitoring').select('*');
        if (error) { 
            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-20 text-rose-500">Gagal memuat data.</td></tr>`;
            return; 
        }

        rawData = data;
        processAndRender(data);
    }

    function processAndRender(data) {
        // Grouping data berdasarkan product_code
        const grouped = data.reduce((acc, curr) => {
            if (!acc[curr.product_code]) {
                acc[curr.product_code] = {
                    name: curr.product_name,
                    code: curr.product_code,
                    ml: curr.ml_per_bottle,
                    outlets: {
                        "GUDANG UTAMA": 0,
                        "CABANA": 0,
                        "DELTA SPA": 0,
                        "KTV": 0,
                        "KITCHEN": 0
                    }
                };
            }
            // Masukkan saldo akhir ke outlet yang sesuai
            const outletKey = curr.outlet_name.toUpperCase();
            if (acc[curr.product_code].outlets.hasOwnProperty(outletKey)) {
                acc[curr.product_code].outlets[outletKey] = curr.saldo_akhir_btl || 0;
            } else if (outletKey.includes("KTV")) {
                acc[curr.product_code].outlets["KTV"] = curr.saldo_akhir_btl || 0;
            }
            return acc;
        }, {});

        const tbody = document.getElementById('stockTableBody');
        const rows = Object.values(grouped);

        if (rows.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-10 text-slate-400">Tidak ada produk.</td></tr>`;
            return;
        }

        tbody.innerHTML = rows.map(item => {
            const total = Object.values(item.outlets).reduce((a, b) => a + b, 0);
            return `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4 sticky-col shadow-sm">
                        <div class="font-black text-slate-800 uppercase text-xs">${item.name}</div>
                        <div class="font-mono text-[10px] text-blue-500">${item.code}</div>
                    </td>
                    <td class="px-6 py-4 text-center font-bold bg-blue-50/30 text-blue-700">${item.outlets["GUDANG UTAMA"]}</td>
                    <td class="px-6 py-4 text-center font-bold">${item.outlets["CABANA"]}</td>
                    <td class="px-6 py-4 text-center font-bold">${item.outlets["DELTA SPA"]}</td>
                    <td class="px-6 py-4 text-center font-bold">${item.outlets["KTV"]}</td>
                    <td class="px-6 py-4 text-center font-bold">${item.outlets["KITCHEN"]}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-3 py-1 rounded-full font-black text-xs bg-slate-900 text-white">${total}</span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex justify-center gap-2">
                            <button onclick="editProduct('${item.code}', '${item.name}', ${item.ml})" class="p-2 hover:bg-blue-50 text-blue-600 rounded-lg">✎</button>
                            <button onclick="deleteProduct('${item.code}')" class="p-2 hover:bg-rose-50 text-rose-600 rounded-lg">✕</button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function filterTable() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const filtered = rawData.filter(row => 
            (row.product_name || "").toLowerCase().includes(val) || 
            (row.product_code || "").toLowerCase().includes(val)
        );
        processAndRender(filtered);
    }

    // Fungsi lainnya tetap sama (Simpan, Edit, Hapus, Import)
    document.getElementById('formProduk').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            product_code: document.getElementById('prodCode').value,
            name: document.getElementById('prodName').value,
            ml_per_bottle: parseInt(document.getElementById('prodMl').value)
        };
        const { error } = await supabaseClient.from('products').upsert(payload, { onConflict: 'product_code' });
        if (error) alert(error.message);
        else { closeModal(); fetchStock(); }
    };

    function editProduct(code, name, ml) {
        openModal();
        document.getElementById('modalTitle').innerText = "Edit Produk";
        document.getElementById('prodCode').value = code;
        document.getElementById('prodCode').readOnly = true;
        document.getElementById('prodName').value = name;
        document.getElementById('prodMl').value = ml;
    }

    async function deleteProduct(code) {
        if(confirm(`Hapus produk ${code}?`)) {
            const { error } = await supabaseClient.from('products').delete().eq('product_code', code);
            if (error) alert(error.message);
            else fetchStock();
        }
    }

    function openModal() { 
        document.getElementById('modalProduk').classList.remove('hidden');
        document.getElementById('prodCode').readOnly = false;
        document.getElementById('formProduk').reset();
    }
    function closeModal() { document.getElementById('modalProduk').classList.add('hidden'); }

    document.addEventListener('DOMContentLoaded', fetchStock);
</script>
</body>
</html>
