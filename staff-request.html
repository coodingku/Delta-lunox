<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Lunox | Stock Request</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script> 
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .card-request { background: white; border-radius: 25px; border: 1px solid rgba(0,0,0,0.05); }
        @media print {
            .no-print { display: none; }
            .print-only { display: block !important; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-2xl mx-auto no-print">
        <div class="flex flex-col mb-8">
            <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Stock Request</h1>
            <p class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Pilih Barang yang Akan Diambil</p>
        </div>

        <div class="card-request p-6 shadow-xl space-y-4">
            <div class="flex gap-2">
                <input type="text" id="scan_input" placeholder="Scan/Ketik Kode QR..." 
                    class="flex-grow bg-slate-100 p-4 rounded-xl text-sm font-semibold outline-none focus:ring-2 ring-blue-500">
                <button onclick="addToRequest()" class="bg-slate-800 text-white px-6 rounded-xl font-black text-[10px] uppercase">Tambah</button>
            </div>

            <div id="request-list" class="space-y-3 py-4 min-h-[200px]">
                <p class="text-center text-slate-300 text-xs py-10 uppercase font-bold">List Request Kosong</p>
            </div>

            <button onclick="processAndPrint()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg shadow-blue-200 active:scale-95 transition-all">
                Simpan & Cetak Struk Request 🖨️
            </button>
        </div>
    </div>

    <div id="print-area" class="hidden print-only text-slate-900 p-4">
        <div class="text-center border-b pb-4 mb-4">
            <h2 class="font-black text-lg">DELTA LUNOX</h2>
            <p class="text-[10px] font-bold uppercase tracking-widest">Struk Pengambilan Barang</p>
            <p id="print-date" class="text-[9px] text-slate-500 mt-1"></p>
        </div>
        <table class="w-full text-xs mb-10">
            <thead><tr class="text-left border-b font-black uppercase"><th class="py-2">Item</th><th>Qty</th></tr></thead>
            <tbody id="print-table-body"></tbody>
        </table>
        <div class="text-[9px] text-center border-t pt-4">
            <p>Bawa struk ini ke bagian gudang</p>
            <p class="font-bold mt-2">Staff Request: __________________</p>
        </div>
    </div>

    <script>
        let requestItems = [];

        // Menambah item ke list request
        async function addToRequest() {
            const input = document.getElementById('scan_input');
            const { data, error } = await supabaseClient.from('products').select('*').eq('qr_code', input.value).single();
            
            if (data) {
                const existing = requestItems.find(i => i.id === data.id);
                if (existing) {
                    existing.quantity += 1;
                } else {
                    requestItems.push({ ...data, quantity: 1 });
                }
                updateListUI();
                input.value = "";
                input.focus();
            } else {
                alert("Produk tidak ditemukan!");
            }
        }

        function updateListUI() {
            const container = document.getElementById('request-list');
            container.innerHTML = "";
            requestItems.forEach((item, index) => {
                container.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-white">
                        <div class="text-left">
                            <p class="text-[11px] font-black text-slate-700 uppercase">${item.name}</p>
                            <p class="text-[9px] font-bold text-slate-400">Qty: ${item.quantity}</p>
                        </div>
                        <button onclick="removeItem(${index})" class="text-red-400 px-2"><i class="fas fa-trash-alt text-xs"></i></button>
                    </div>`;
            });
        }

        function removeItem(index) {
            requestItems.splice(index, 1);
            updateListUI();
        }

        function processAndPrint() {
            if (requestItems.length === 0) return alert("Pilih barang dulu!");
            
            // Masukkan ke area cetak
            const printBody = document.getElementById('print-table-body');
            printBody.innerHTML = "";
            requestItems.forEach(item => {
                printBody.innerHTML += `<tr><td class="py-1">${item.name}</td><td>${item.quantity}</td></tr>`;
            });
            document.getElementById('print-date').innerText = new Date().toLocaleString();
            
            // Jalankan Print
            window.print();
            
            // Opsional: Kosongkan list setelah print
            // requestItems = []; updateListUI();
        }
    </script>
</body>
</html>
