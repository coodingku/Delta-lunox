<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Data Manager | Delta Lunox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Library untuk membaca Excel (XLSX) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Library Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; }
        .btn-primary { background: #0f172a; color: white; transition: all 0.2s; }
        .btn-primary:hover { background: #334155; transform: translateY(-1px); }
    </style>
</head>
<body class="p-6 lg:p-12">

    <div class="max-w-5xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-black text-slate-900 uppercase tracking-tighter">Inventory Master Controller</h1>
            <p class="text-slate-500 font-medium mt-2">Kelola Import Database & Export Laporan Miras 2026</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- SEKSI IMPORT -->
            <div class="card p-8 shadow-sm">
                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                </div>
                <h2 class="text-xl font-extrabold text-slate-800 mb-2">Import Data Master</h2>
                <p class="text-sm text-slate-500 mb-6 font-medium">Unggah file Excel untuk memperbarui daftar produk dan stok awal.</p>
                
                <input type="file" id="importFile" accept=".xlsx, .xls" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200 mb-6"/>
                
                <button onclick="handleImport()" class="w-full btn-primary py-4 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-slate-200">
                    Proses Import ke Database
                </button>
            </div>

            <!-- SEKSI EXPORT -->
            <div class="card p-8 shadow-sm">
                <div class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4-4v12" />
                    </svg>
                </div>
                <h2 class="text-xl font-extrabold text-slate-800 mb-2">Export Laporan</h2>
                <p class="text-sm text-slate-500 mb-6 font-medium">Unduh laporan sisa stok terbaru untuk seluruh unit dalam format Excel.</p>
                
                <div class="space-y-4">
                    <select id="exportUnit" class="w-full p-4 rounded-xl bg-slate-50 border-none font-bold text-xs outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-900">
                        <option value="ALL">SEMUA UNIT (CABANA, DELTA, LUNOX)</option>
                        <option value="CABANA">CABANA SPA</option>
                        <option value="DELTA">DELTA SPA</option>
                        <option value="LUNOX">KTV LUNOX</option>
                    </select>

                    <button onclick="handleExport()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-emerald-100 hover:bg-emerald-700 transition-all">
                        Unduh Laporan XLSX
                    </button>
                </div>
            </div>

        </div>

        <div id="statusMessage" class="mt-10 p-4 rounded-xl text-center font-bold text-xs uppercase tracking-widest hidden"></div>
    </div>

    <script>
        // KONEKSI SUPABASE (Ganti dengan API Key Anda)
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // FUNGSI IMPORT EXCEL KE DATABASE
        async function handleImport() {
            const fileInput = document.getElementById('importFile');
            if (!fileInput.files[0]) return alert("Pilih file Excel terlebih dahulu!");

            showStatus("Sedang Memproses Data...", "bg-blue-50 text-blue-600");
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                
                // Mengambil Sheet DATABASE_PRODUK
                const sheet = workbook.Sheets["DATABASE_PRODUK"];
                const json = XLSX.utils.sheet_to_json(sheet);

                // Import ke tabel 'products' di Supabase
                const { error } = await supabase.from('products').upsert(json, { onConflict: 'product_code' });

                if (error) {
                    showStatus("Error: " + error.message, "bg-red-50 text-red-600");
                } else {
                    showStatus("Import Berhasil! Database Produk Diperbarui.", "bg-emerald-50 text-emerald-600");
                }
            };
            reader.readAsArrayBuffer(fileInput.files[0]);
        }

        // FUNGSI EXPORT DATABASE KE EXCEL
        async function handleExport() {
            showStatus("Menyiapkan Data Laporan...", "bg-amber-50 text-amber-600");

            // Mengambil data dari VIEW (yang sudah kita buat di SQL sebelumnya)
            const unit = document.getElementById('exportUnit').value;
            let query = supabase.from('view_stock_monitoring').select('*');
            
            if (unit !== 'ALL') query = query.eq('unit_name', unit);

            const { data, error } = await query;

            if (error) {
                showStatus("Gagal menarik data: " + error.message, "bg-red-50 text-red-600");
                return;
            }

            // Generate Excel
            const worksheet = XLSX.utils.json_to_sheet(data);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Laporan Stok");

            // Download File
            const fileName = `Report_Inventory_${unit}_${new Date().toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(workbook, fileName);
            
            showStatus("Laporan Berhasil Diunduh!", "bg-emerald-50 text-emerald-600");
        }

        function showStatus(msg, classes) {
            const el = document.getElementById('statusMessage');
            el.className = `mt-10 p-4 rounded-xl text-center font-bold text-xs uppercase tracking-widest ${classes}`;
            el.innerText = msg;
            el.classList.remove('hidden');
        }
    </script>
</body>
</html>
