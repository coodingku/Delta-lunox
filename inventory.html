<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miras Inventory | Delta Lunox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: white; border-radius: 24px; border: 1px solid rgba(0,0,0,0.05); }
        .input-in { background: #eff6ff; border: 1px solid #dbeafe; color: #1e40af; }
        .input-mut { background: #fffbeb; border: 1px solid #fef3c7; color: #92400e; }
        .input-out { background: #ecfdf5; border: 1px solid #d1fae5; color: #065f46; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header Monitoring -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-black tracking-tight uppercase text-slate-800">Daily Miras Report</h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Unit: <span id="unitNameDisplay" class="text-blue-600">Loading...</span></p>
            </div>
            <div class="flex gap-4">
                <div class="bg-white px-6 py-3 rounded-2xl shadow-sm border border-slate-100 text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Status Input</p>
                    <p id="inputStatus" class="text-xs font-bold text-emerald-500 uppercase italic">Ready</p>
                </div>
                <input type="date" id="reportDate" onchange="loadInventory()" class="bg-white px-4 py-3 rounded-2xl font-bold text-xs shadow-sm border-none outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </header>

        <!-- Table Card -->
        <div class="glass-card overflow-hidden shadow-xl shadow-slate-200/50">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-900 text-white">
                        <tr>
                            <th class="p-5 text-[10px] font-black uppercase tracking-widest">Produk</th>
                            <th class="p-5 text-[10px] font-black uppercase tracking-widest text-center">Awal (Btl)</th>
                            <th class="p-5 text-[10px] font-black uppercase tracking-widest text-center">In</th>
                            <th class="p-5 text-[10px] font-black uppercase tracking-widest text-center">Mutasi</th>
                            <th class="p-5 text-[10px] font-black uppercase tracking-widest text-center">Saldo (Btl)</th>
                            <th class="p-5 text-[10px] font-black uppercase tracking-widest text-center">Out (Gls)</th>
                            <th class="p-5 text-[10px] font-black uppercase tracking-widest text-center">Sisa (Gls)</th>
                            <th class="p-5 text-[10px] font-black uppercase tracking-widest text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody" class="divide-y divide-slate-50">
                        <!-- Data ditarik dari Supabase -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="mt-6 flex justify-end">
            <button onclick="saveAllChanges()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-lg shadow-blue-200 hover:bg-slate-900 transition-all">
                Simpan Laporan Hari Ini
            </button>
        </div>
    </div>

    <script>
        // Simulasi konfigurasi unit (Bisa diganti sesuai login staff)
        const CURRENT_UNIT = "CABANA"; 
        document.getElementById('unitNameDisplay').innerText = CURRENT_UNIT;
        document.getElementById('reportDate').valueAsDate = new Date();

        async function loadInventory() {
            const date = document.getElementById('reportDate').value;
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = `<tr><td colspan="8" class="p-10 text-center text-slate-400 font-bold uppercase text-xs">Menarik Data...</td></tr>`;

            // Ambil data produk & log harian
            const { data: products } = await supabaseClient.from('products').select('*').order('name');
            const { data: logs } = await supabaseClient.from('daily_inventory')
                .select('*')
                .eq('unit_name', CURRENT_UNIT)
                .eq('log_date', date);

            tbody.innerHTML = products.map(p => {
                const log = logs?.find(l => l.product_id === p.id) || {};
                const stockAwal = p.stok_gudang || 0; // Mengambil stok awal dari tabel master
                const valIn = log.stock_in || 0;
                const valMut = log.mutation || 0;
                const saldoBtl = stockAwal + valIn + valMut;
                const totalGls = (saldoBtl * (p.ml || 700)) / 30; // Logika Gelas sesuai prompt
                const valOut = log.stock_out || 0;
                const sisaGls = totalGls - valOut;

                return `
                <tr class="hover:bg-slate-50/80 transition-colors">
                    <td class="p-5">
                        <div class="font-black text-xs uppercase text-slate-800">${p.name}</div>
                        <div class="text-[9px] font-bold text-slate-400 uppercase">${p.qr_code}</div>
                    </td>
                    <td class="p-5 text-center font-bold text-slate-400 text-sm">${stockAwal}</td>
                    <td class="p-5 text-center">
                        <input type="number" data-id="${p.id}" data-field="stock_in" value="${valIn}" 
                            class="w-16 p-2 rounded-xl text-center font-black text-xs input-in outline-none focus:ring-2 focus:ring-blue-400">
                    </td>
                    <td class="p-5 text-center">
                        <input type="number" data-id="${p.id}" data-field="mutation" value="${valMut}" 
                            class="w-16 p-2 rounded-xl text-center font-black text-xs input-mut outline-none focus:ring-2 focus:ring-amber-400">
                    </td>
                    <td class="p-5 text-center font-black text-slate-800 text-sm">${saldoBtl}</td>
                    <td class="p-5 text-center">
                        <input type="number" data-id="${p.id}" data-field="stock_out" value="${valOut}" 
                            class="w-16 p-2 rounded-xl text-center font-black text-xs input-out outline-none focus:ring-2 focus:ring-emerald-400">
                    </td>
                    <td class="p-5 text-center">
                        <span class="px-3 py-1 bg-slate-100 rounded-lg font-black text-xs ${sisaGls <= 5 ? 'text-red-500' : 'text-slate-600'}">
                            ${sisaGls.toFixed(1)}
                        </span>
                    </td>
                    <td class="p-5 text-right">
                        <i class="fas fa-check-circle text-emerald-400 opacity-0 transition-opacity" id="status-${p.id}"></i>
                    </td>
                </tr>
                `;
            }).join('');
        }

        async function saveAllChanges() {
            const date = document.getElementById('reportDate').value;
            const inputs = document.querySelectorAll('input[data-id]');
            const updates = {};

            inputs.forEach(input => {
                const id = input.dataset.id;
                const field = input.dataset.field;
                if (!updates[id]) updates[id] = { product_id: id, unit_name: CURRENT_UNIT, log_date: date };
                updates[id][field] = parseInt(input.value) || 0;
            });

            const payload = Object.values(updates);

            const { error } = await supabaseClient
                .from('daily_inventory')
                .upsert(payload, { onConflict: 'product_id,unit_name,log_date' });

            if (error) {
                alert("Gagal menyimpan data: " + error.message);
            } else {
                alert("Laporan Berhasil Disimpan!");
                loadInventory();
            }
        }

        window.onload = loadInventory;
    </script>
</body>
</html>
