<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Harian | Delta Lunox</title>
    <link rel="icon" href="data:,"> <!-- Mencegah error favicon 404 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .input-card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; transition: transform 0.1s; }
        .input-card:active { transform: scale(0.98); }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="max-w-md mx-auto">
        <!-- Header Info -->
        <header class="glass-header sticky top-0 z-10 py-4 mb-6 -mx-4 px-4">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-lg font-black text-slate-900 uppercase tracking-tighter">Daily Report</h1>
                    <p id="unitTag" class="text-[10px] font-extrabold text-blue-600 uppercase tracking-widest">Loading...</p>
                </div>
                <input type="date" id="logDate" onchange="loadInventory()" class="text-xs font-bold bg-slate-100 p-2 rounded-lg outline-none border-none">
            </div>
        </header>

        <!-- Daftar Produk -->
        <div id="productList" class="space-y-4">
            <div class="flex justify-center py-20">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            </div>
        </div>

        <!-- Tombol Simpan -->
        <div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-white via-white to-transparent">
            <button onclick="saveReport()" id="btnSave" class="w-full max-w-md mx-auto block bg-slate-900 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-xl hover:bg-blue-600 transition-all active:bg-blue-700">
                Simpan Laporan Hari Ini
            </button>
        </div>
    </div>

    <script>
        // 1. Deklarasi Library & Konfigurasi
        const { createClient } = supabase;
        const SUPABASE_URL = 'https://ziqimmcdfjhhjpcloxzs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppcWltbWNkZmpoaGpwY2xveHpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNTM2MzIsImV4cCI6MjA5MzYyOTYzMn0.PSWyImlqJZ7F4Gfw5UecmZSHXYQ4Aa-1er5sAEGgcq8';
        
        // 2. Inisialisasi Client (Gunakan nama unik agar tidak bentrok)
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Ubah ini sesuai unit staff: 'CABANA SPA', 'DELTA SPA', atau 'KTV LUNOX'
        const CURRENT_UNIT = "CABANA SPA"; 
        
        document.getElementById('unitTag').innerText = CURRENT_UNIT;
        document.getElementById('logDate').valueAsDate = new Date();

        // 3. Fungsi Load Data dari Supabase
        async function loadInventory() {
            const date = document.getElementById('logDate').value;
            const container = document.getElementById('productList');
            
            // Ambil Data Master & Log Transaksi secara paralel
            const [reqProducts, reqLogs] = await Promise.all([
                supabaseClient.from('products').select('*').order('name'),
                supabaseClient.from('daily_inventory').select('*').eq('unit_name', CURRENT_UNIT).eq('log_date', date)
            ]);

            if (reqProducts.error) {
                container.innerHTML = `<p class="text-center text-red-500 font-bold">Error: ${reqProducts.error.message}</p>`;
                return;
            }

            container.innerHTML = reqProducts.data.map(p => {
                const log = reqLogs.data?.find(l => l.product_id === p.id) || {};
                return `
                <div class="input-card p-5">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-sm font-extrabold text-slate-800 uppercase leading-tight">${p.name}</h3>
                            <p class="text-[9px] font-bold text-slate-400 mt-1">${p.product_code} | ${p.ml_per_bottle}ml</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-3">
                        <div class="text-center bg-blue-50/50 p-2 rounded-xl">
                            <label class="text-[8px] font-black text-blue-400 uppercase block mb-1">In (Btl)</label>
                            <input type="number" data-id="${p.id}" data-field="stock_in" value="${log.stock_in || 0}"
                                class="w-full bg-transparent text-center font-black text-blue-600 outline-none">
                        </div>
                        <div class="text-center bg-amber-50/50 p-2 rounded-xl">
                            <label class="text-[8px] font-black text-amber-400 uppercase block mb-1">Mutasi</label>
                            <input type="number" data-id="${p.id}" data-field="mutation" value="${log.mutation || 0}"
                                class="w-full bg-transparent text-center font-black text-amber-600 outline-none">
                        </div>
                        <div class="text-center bg-emerald-50 p-2 rounded-xl border border-emerald-100">
                            <label class="text-[8px] font-black text-emerald-500 uppercase block mb-1">Out (Gls)</label>
                            <input type="number" data-id="${p.id}" data-field="stock_out_glass" value="${log.stock_out_glass || 0}"
                                class="w-full bg-transparent text-center font-black text-emerald-700 outline-none">
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // 4. Fungsi Simpan (Upsert)
        async function saveReport() {
            const date = document.getElementById('logDate').value;
            const btn = document.getElementById('btnSave');
            const inputs = document.querySelectorAll('input[data-id]');
            
            btn.innerText = "SEDANG MENYIMPAN...";
            btn.disabled = true;

            const updates = {};
            inputs.forEach(input => {
                const id = input.dataset.id;
                const field = input.dataset.field;
                if (!updates[id]) {
                    updates[id] = { product_id: id, unit_name: CURRENT_UNIT, log_date: date };
                }
                updates[id][field] = parseInt(input.value) || 0;
            });

            const { error } = await supabaseClient.from('daily_inventory').upsert(Object.values(updates), {
                onConflict: 'product_id,unit_name,log_date'
            });

            if (error) {
                alert("Gagal Simpan: " + error.message);
                btn.innerText = "COBA LAGI";
            } else {
                alert("Laporan Unit " + CURRENT_UNIT + " Berhasil Terkirim!");
                btn.innerText = "BERHASIL DISIMPAN";
                setTimeout(() => btn.innerText = "Simpan Laporan Hari Ini", 2000);
            }

            btn.disabled = false;
        }

        window.onload = loadInventory;
    </script>
</body>
</html>
