<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delta Lunox | Back Cam POS 📱</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script> 
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .card-premium { background: white; border-radius: 30px; border: 1px solid rgba(0,0,0,0.05); }
        /* Area Kamera Khusus */
        #reader { 
            width: 100%; 
            border-radius: 20px; 
            overflow: hidden; 
            background: #000;
            aspect-ratio: 1/1;
        }
    </style>
</head>
<body class="p-4">

    <nav class="flex justify-between items-center mb-6 px-2">
        <div class="flex flex-col">
            <h1 class="text-xl font-black text-slate-800 tracking-tighter uppercase">Delta Lunox</h1>
            <p class="text-[9px] font-bold text-blue-500 uppercase tracking-widest text-left">Force Back Camera</p>
        </div>
        <a href="input-produk.html" class="text-[10px] font-black text-slate-400 border px-3 py-2 rounded-xl">Input Produk</a>
    </nav>

    <div class="grid grid-cols-1 gap-6">
        
        <div class="card-premium p-4 shadow-xl">
            <div id="reader"></div>
            
            <div class="flex flex-col items-center mt-4 gap-2">
                <button id="btn-scan" onclick="startScanning()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest w-full">
                    <i class="fas fa-camera mr-2"></i> Aktifkan Kamera Belakang
                </button>
                <p id="scan-status" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-2">Kamera Belakang Siap</p>
            </div>
        </div>

        <div class="card-premium p-6 shadow-2xl flex flex-col min-h-[350px]">
            <div class="flex justify-between items-center mb-6 border-b pb-4 border-slate-50">
                <h3 class="text-xs font-black text-slate-800 uppercase">Keranjang</h3>
                <span id="item-count" class="bg-slate-100 text-[10px] px-3 py-1 rounded-full font-bold text-slate-500">0 Items</span>
            </div>

            <div id="cart-list" class="flex-grow space-y-3 overflow-y-auto max-h-[250px]">
                <div class="text-center py-10 text-slate-300 font-bold uppercase text-[9px]">Belum ada produk</div>
            </div>

            <div class="mt-6 pt-6 border-t border-dashed border-slate-200">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] font-black text-slate-400 uppercase">Total</span>
                    <span id="total-price" class="text-2xl font-black text-slate-800 tracking-tighter">Rp 0</span>
                </div>
                <button onclick="checkout()" class="w-full bg-[#f72585] text-white py-5 rounded-[25px] text-xs font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">
                    Bayar & Potong Stok 🌸
                </button>
            </div>
        </div>
    </div>

<script>
    let cart = [];
    let isScanning = false;
    let html5QrCode;

    // FUNGSI UTAMA: PAKSA KAMERA BELAKANG
    function startScanning() {
        html5QrCode = new Html5Qrcode("reader");
        const qrCodeSuccessCallback = (decodedText) => {
            if (isScanning) return;
            isScanning = true;

            // Feedback getar
            if (navigator.vibrate) navigator.vibrate(80);
            
            findProduct(decodedText);

            // Jeda 2 detik agar tidak terscan berkali-kali
            setTimeout(() => { isScanning = false; }, 2000);
        };

        const config = { fps: 15, qrbox: { width: 250, height: 250 } };

        // PERINTAH KRUSIAL: environment = KAMERA BELAKANG
        html5QrCode.start({ facingMode: "environment" }, config, qrCodeSuccessCallback)
        .then(() => {
            document.getElementById('btn-scan').style.display = 'none';
            document.getElementById('scan-status').innerText = "Kamera Belakang Sedang Memindai...";
            document.getElementById('scan-status').classList.add('text-green-500');
        })
        .catch((err) => {
            alert("Gagal akses kamera belakang: " + err);
        });
    }

    async function findProduct(qrCode) {
        const { data, error } = await supabaseClient
            .from('products')
            .select('*')
            .eq('qr_code', qrCode)
            .single();

        if (data) {
            cart.push(data);
            updateCartUI();
        }
    }

    function updateCartUI() {
        const list = document.getElementById('cart-list');
        list.innerHTML = "";
        let total = 0;
        document.getElementById('item-count').innerText = cart.length + " Items";

        if (cart.length === 0) {
            list.innerHTML = `<div class="text-center py-10 text-slate-300 font-bold uppercase text-[9px]">Belum ada produk</div>`;
        }

        cart.forEach((item, index) => {
            total += parseFloat(item.price);
            list.innerHTML += `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-white shadow-sm">
                    <div class="text-left">
                        <p class="text-[10px] font-black text-slate-700 uppercase leading-tight">${item.name}</p>
                        <p class="text-[9px] font-bold text-blue-500 mt-1">Rp ${parseFloat(item.price).toLocaleString()}</p>
                    </div>
                    <button onclick="removeItem(${index})" class="text-red-300 px-2"><i class="fas fa-trash-alt text-xs"></i></button>
                </div>`;
        });
        document.getElementById('total-price').innerText = "Rp " + total.toLocaleString();
    }

    async function checkout() {
        if (cart.length === 0) return alert("Keranjang kosong!");
        const total = cart.reduce((acc, curr) => acc + parseFloat(curr.price), 0);
        const { data: trans, error: tErr } = await supabaseClient
            .from('transactions').insert([{ total_amount: total, payment_method: 'Tunai' }]).select().single();

        if (tErr) return alert(tErr.message);

        const items = cart.map(i => ({ transaction_id: trans.id, product_id: i.id, quantity: 1, subtotal: i.price }));
        const { error: iErr } = await supabaseClient.from('transaction_items').insert(items);

        if (!iErr) {
            alert("Berhasil! Stok Terpotong.");
            cart = [];
            updateCartUI();
        }
    }

    function removeItem(index) {
        cart.splice(index, 1);
        updateCartUI();
    }
</script>
</body>
</html>
