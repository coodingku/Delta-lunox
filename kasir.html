<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delta Lunox | Mobile POS 📱</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script> 
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .card-premium { background: white; border-radius: 30px; border: 1px solid rgba(0,0,0,0.05); }
        #reader { border: none !important; border-radius: 20px; overflow: hidden; background: #000; }
        /* Memperbaiki tampilan tombol bawaan library di HP */
        #reader__dashboard_section_csr button {
            background: #1e293b !important;
            color: white !important;
            border-radius: 12px !important;
            padding: 10px 20px !important;
            font-size: 11px !important;
            text-transform: uppercase !important;
            font-weight: 800 !important;
            margin: 5px !important;
        }
    </style>
</head>
<body class="p-4">

    <nav class="flex justify-between items-center mb-6 px-2">
        <div class="flex flex-col">
            <h1 class="text-xl font-black text-slate-800 tracking-tighter uppercase">Delta Lunox</h1>
            <p class="text-[9px] font-bold text-blue-500 uppercase tracking-widest text-left">Mobile Scanner</p>
        </div>
        <a href="input-produk.html" class="w-10 h-10 bg-white shadow-sm border border-slate-100 rounded-full flex items-center justify-center text-slate-400">
            <i class="fas fa-plus"></i>
        </a>
    </nav>

    <div class="grid grid-cols-1 gap-6">
        
        <div class="card-premium p-4 shadow-xl shadow-slate-200/50">
            <div id="reader" class="w-full"></div>
            <div class="mt-4 flex items-center justify-center gap-2">
                <i class="fas fa-camera text-blue-500 text-xs"></i>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Kamera Belakang Aktif</p>
            </div>
        </div>

        <div class="card-premium p-6 shadow-2xl shadow-slate-200 flex flex-col min-h-[400px]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-sm font-black text-slate-800 uppercase tracking-tight">Keranjang Belanja</h3>
                <button onclick="clearCart()" class="text-[10px] font-bold text-red-400 uppercase">Hapus Semua</button>
            </div>

            <div id="cart-list" class="flex-grow space-y-3 overflow-y-auto max-h-[300px]">
                <div class="text-center py-10 text-slate-300 font-bold uppercase text-[9px]">Belum ada produk</div>
            </div>

            <div class="mt-6 pt-6 border-t border-dashed border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black text-slate-400 uppercase">Total</span>
                    <span id="total-price" class="text-2xl font-black text-slate-800">Rp 0</span>
                </div>
                <button onclick="checkout()" class="w-full bg-[#f72585] text-white py-4 rounded-2xl text-xs font-black uppercase tracking-widest shadow-lg shadow-pink-100 active:scale-95 transition-all">
                    Bayar & Potong Stok 🌸
                </button>
            </div>
        </div>
    </div>

<script>
    let cart = [];
    let isScanning = false;

    // Fungsi Scan Sukses
    async function onScanSuccess(decodedText) {
        if (isScanning) return;
        isScanning = true;

        // Berikan getaran singkat pada HP saat scan berhasil
        if (navigator.vibrate) navigator.vibrate(100);

        const { data, error } = await supabaseClient
            .from('products')
            .select('*')
            .eq('qr_code', decodedText)
            .single();

        if (data) {
            cart.push(data);
            updateCartUI();
        } else {
            console.log("Kode tidak dikenal: " + decodedText);
        }

        // Jeda agar tidak double scan
        setTimeout(() => { isScanning = false; }, 1500);
    }

    function updateCartUI() {
        const list = document.getElementById('cart-list');
        list.innerHTML = "";
        let total = 0;

        if (cart.length === 0) {
            list.innerHTML = `<div class="text-center py-10 text-slate-300 font-bold uppercase text-[9px]">Belum ada produk</div>`;
        }

        cart.forEach((item, index) => {
            total += parseFloat(item.price);
            list.innerHTML += `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-white">
                    <div class="text-left">
                        <p class="text-[10px] font-black text-slate-700 uppercase leading-tight">${item.name}</p>
                        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">Rp ${parseFloat(item.price).toLocaleString()}</p>
                    </div>
                    <button onclick="removeItem(${index})" class="text-red-300 px-2">
                        <i class="fas fa-trash-alt text-xs"></i>
                    </button>
                </div>
            `;
        });
        document.getElementById('total-price').innerText = "Rp " + total.toLocaleString();
    }

    async function checkout() {
        if (cart.length === 0) return alert("Isi keranjang dulu!");
        const total = cart.reduce((acc, curr) => acc + parseFloat(curr.price), 0);

        const { data: trans, error: tErr } = await supabaseClient
            .from('transactions')
            .insert([{ total_amount: total, payment_method: 'Tunai' }])
            .select().single();

        if (tErr) return alert(tErr.message);

        const items = cart.map(i => ({ 
            transaction_id: trans.id, 
            product_id: i.id, 
            quantity: 1, 
            subtotal: i.price 
        }));

        const { error: iErr } = await supabaseClient.from('transaction_items').insert(items);

        if (!iErr) {
            alert("Berhasil! Stok otomatis berkurang. ✨");
            cart = [];
            updateCartUI();
        }
    }

    function removeItem(index) {
        cart.splice(index, 1);
        updateCartUI();
    }

    function clearCart() {
        cart = [];
        updateCartUI();
    }

    // --- KONFIGURASI KHUSUS KAMERA BELAKANG HP ---
    const config = { 
        fps: 20, 
        qrbox: { width: 200, height: 200 },
        aspectRatio: 1.0
    };

    const scanner = new Html5QrcodeScanner("reader", config, false);
    
    // Memulai scanner dengan preferensi kamera belakang (facingMode: "environment")
    scanner.render(onScanSuccess);

    // Tips: Library html5-qrcode secara default akan mencoba kamera belakang 
    // jika diakses melalui perangkat mobile.
</script>
</body>
</html>
