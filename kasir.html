<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delta Lunox | POS Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script> 
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .card-premium { background: white; border-radius: 35px; border: 1px solid rgba(0,0,0,0.05); }
        #reader { border: none !important; border-radius: 25px; overflow: hidden; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="flex justify-between items-center mb-8">
        <div class="flex flex-col">
            <h1 class="text-xl font-black text-slate-800 uppercase">Delta Lunox</h1>
            <p class="text-[9px] font-bold text-blue-500 uppercase tracking-widest text-left">POS Terminal</p>
        </div>
        <a href="input-produk.html" class="text-[10px] font-bold text-slate-400 border border-slate-200 px-4 py-2 rounded-xl hover:bg-slate-100 transition">Ke Input Produk →</a>
    </nav>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-5">
            <div class="card-premium p-6 shadow-xl shadow-slate-200/50">
                <div id="reader" class="bg-slate-100"></div>
                <p class="text-[10px] text-center mt-4 text-slate-400 font-bold uppercase tracking-widest">Scan Produk (0001, 0002, dll)</p>
            </div>
        </div>

        <div class="lg:col-span-7">
            <div class="card-premium p-8 shadow-2xl shadow-slate-200 min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-black text-slate-800 uppercase">Checkout</h2>
                    <button onclick="clearCart()" class="text-xs font-bold text-red-400">Reset</button>
                </div>
                <div id="cart-list" class="flex-grow space-y-4"></div>
                <div class="mt-8 pt-6 border-t border-dashed">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold text-slate-400 uppercase">Total</span>
                        <span id="total-price" class="text-2xl font-black text-slate-800 tracking-tighter text-right">Rp 0</span>
                    </div>
                    <button onclick="checkout()" class="w-full bg-[#f72585] text-white py-4 rounded-2xl font-black uppercase text-xs shadow-lg shadow-pink-100">Bayar Sekarang</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cart = [];
        let isScanning = false;

        async function findProduct(qrCode) {
            if(isScanning) return;
            isScanning = true;

            const { data } = await supabaseClient.from('products').select('*').eq('qr_code', qrCode).single();
            if (data) {
                cart.push(data);
                updateUI();
            }
            setTimeout(() => { isScanning = false; }, 1500);
        }

        function updateUI() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.length === 0 ? '<p class="text-center text-slate-300 py-10">Kosong</p>' : '';
            let total = 0;
            cart.forEach((item, index) => {
                total += parseFloat(item.price);
                list.innerHTML += `<div class="flex justify-between p-4 bg-slate-50 rounded-2xl">
                    <div class="text-left"><p class="text-xs font-black uppercase">${item.name}</p></div>
                    <p class="font-black">Rp ${item.price.toLocaleString()}</p>
                </div>`;
            });
            document.getElementById('total-price').innerText = "Rp " + total.toLocaleString();
        }

        async function checkout() {
            if (cart.length === 0) return alert("Pilih barang!");
            const total = cart.reduce((acc, c) => acc + parseFloat(c.price), 0);
            const { data: trans, error } = await supabaseClient.from('transactions').insert([{ total_amount: total }]).select().single();
            if (error) return alert(error.message);
            
            const items = cart.map(i => ({ transaction_id: trans.id, product_id: i.id, quantity: 1, subtotal: i.price }));
            await supabaseClient.from('transaction_items').insert(items);
            alert("Berhasil!"); cart = []; updateUI();
        }

        const scanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 });
        scanner.render(txt => findProduct(txt));
        function clearCart() { cart = []; updateUI(); }
    </script>
</body>
</html>
