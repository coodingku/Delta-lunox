<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delta Lunox | Kasir POS 🌸</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script> 
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card-premium { background: white; border-radius: 30px; border: 1px solid rgba(0,0,0,0.05); shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; background: #000; aspect-ratio: 1/1; }
        .dept-select { transition: all 0.2s ease; border: 2px solid #e2e8f0; }
        .dept-select.active { border-color: #f72585; background: #fff1f7; color: #f72585; transform: scale(0.98); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black uppercase tracking-tighter">Delta Lunox</h1>
                <p class="text-[9px] font-bold text-pink-500 uppercase tracking-widest">Digital Cashier System</p>
            </div>
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm">
                <i class="fas fa-shopping-cart text-slate-300 text-xs"></i>
            </div>
        </div>

        <div class="card-premium p-6 mb-6">
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Titik Penjualan (Potong Stok)</label>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setLocation('ktv')" class="dept-select p-3 rounded-xl text-[10px] font-bold uppercase" id="loc-ktv">KTV</button>
                <button onclick="setLocation('spa')" class="dept-select p-3 rounded-xl text-[10px] font-bold uppercase" id="loc-spa">SPA</button>
                <button onclick="setLocation('cabana')" class="dept-select p-3 rounded-xl text-[10px] font-bold uppercase" id="loc-cabana">CABANA</button>
                <button onclick="setLocation('kitchen')" class="dept-select p-3 rounded-xl text-[10px] font-bold uppercase" id="loc-kitchen">KITCHEN</button>
            </div>
        </div>

        <div class="card-premium p-4 mb-6">
            <div id="reader"></div>
            <button id="btn-scan" onclick="startScanner()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest mt-4">
                Buka Kamera Scan
            </button>
        </div>

        <div class="card-premium p-6 min-h-[300px] flex flex-col">
            <div class="flex justify-between items-center mb-6 border-b pb-4 border-slate-50">
                <h3 class="text-xs font-black uppercase">Pesanan</h3>
                <span id="cart-count" class="text-[10px] font-bold text-slate-400">0 Items</span>
            </div>

            <div id="cart-list" class="flex-grow space-y-3 mb-6">
                <div class="text-center py-10 text-slate-300 text-[10px] font-bold uppercase">Keranjang Kosong</div>
            </div>

            <div class="border-t border-dashed pt-6">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] font-black text-slate-400 uppercase">Total Bayar</span>
                    <span id="total-price" class="text-2xl font-black tracking-tighter">Rp 0</span>
                </div>
                <button onclick="processCheckout()" class="w-full bg-[#f72585] text-white py-5 rounded-[25px] font-black uppercase text-xs tracking-widest shadow-lg shadow-pink-200 active:scale-95 transition-all">
                    Bayar Sekarang ✨
                </button>
            </div>
        </div>
    </div>

<script>
    let cart = [];
    let selectedLocation = "";
    let isScanning = false;
    let html5QrCode;

    function setLocation(loc) {
        selectedLocation = loc;
        document.querySelectorAll('.dept-select').forEach(btn => btn.classList.remove('active'));
        document.getElementById('loc-' + loc).classList.add('active');
    }

    function startScanner() {
        if (!selectedLocation) return alert("Pilih lokasi penjualan dulu!");
        
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (txt) => {
            if (isScanning) return;
            isScanning = true;
            if (navigator.vibrate) navigator.vibrate(100);
            addToCart(txt);
            setTimeout(() => { isScanning = false; }, 1500);
        }).then(() => document.getElementById('btn-scan').style.display = 'none');
    }

    async function addToCart(qrCode) {
        const targetColumn = `stok_${selectedLocation}`;
        const { data, error } = await supabaseClient
            .from('products')
            .select(`id, name, price, ${targetColumn}`)
            .eq('qr_code', qrCode)
            .single();

        if (data) {
            if (data[targetColumn] <= 0) {
                alert(`Stok di ${selectedLocation.toUpperCase()} Habis!`);
                return;
            }
            cart.push(data);
            updateUI();
        }
    }

    function updateUI() {
        const list = document.getElementById('cart-list');
        const totalEl = document.getElementById('total-price');
        let total = 0;
        
        document.getElementById('cart-count').innerText = cart.length + " Items";
        
        if (cart.length === 0) {
            list.innerHTML = `<div class="text-center py-10 text-slate-300 text-[10px] font-bold uppercase">Keranjang Kosong</div>`;
            totalEl.innerText = "Rp 0";
            return;
        }

        list.innerHTML = cart.map((item, index) => {
            total += parseFloat(item.price);
            return `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-white">
                    <div class="text-left">
                        <p class="text-[10px] font-black uppercase text-slate-700 leading-tight">${item.name}</p>
                        <p class="text-[9px] font-bold text-pink-500">Rp ${parseFloat(item.price).toLocaleString()}</p>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-slate-300 hover:text-red-400 transition-colors">
                        <i class="fas fa-times-circle text-sm"></i>
                    </button>
                </div>
            `;
        }).join('');

        totalEl.innerText = "Rp " + total.toLocaleString();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateUI();
    }

    async function processCheckout() {
        if (cart.length === 0) return alert("Keranjang masih kosong!");
        if (!selectedLocation) return alert("Pilih lokasi!");

        const confirmPay = confirm(`Proses pembayaran & potong stok di ${selectedLocation.toUpperCase()}?`);
        if (!confirmPay) return;

        try {
            // Hitung ringkasan qty per produk
            const summary = cart.reduce((acc, item) => {
                acc[item.id] = (acc[item.id] || 0) + 1;
                return acc;
            }, {});

            const targetColumn = `stok_${selectedLocation}`;

            for (const [id, qty] of Object.entries(summary)) {
                // 1. Ambil stok terkini di lokasi terpilih
                const { data: prod } = await supabaseClient
                    .from('products')
                    .select(targetColumn)
                    .eq('id', id)
                    .single();

                // 2. Update stok (Hanya memotong stok departemen tersebut)
                const { error } = await supabaseClient
                    .from('products')
                    .update({ [targetColumn]: (prod[targetColumn] || 0) - qty })
                    .eq('id', id);

                if (error) throw error;
            }

            // Simpan transaksi ke tabel history (opsional)
            // await supabaseClient.from('transactions').insert([...]);

            alert("Transaksi Berhasil! Stok " + selectedLocation.toUpperCase() + " telah terpotong.");
            cart = [];
            updateUI();

        } catch (err) {
            alert("Gagal memproses transaksi: " + err.message);
        }
    }
</script>
</body>
</html>
