<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Lunox | Master Produk 📦</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script> 
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .sidebar { transition: all 0.3s; width: 280px; background: #0f172a; flex-shrink: 0; }
        .nav-link { transition: all 0.2s; color: #94a3b8; border-radius: 15px; }
        .nav-link:hover, .nav-link.active { background: #1e293b; color: white; }
        .glass-card { background: white; border-radius: 25px; border: 1px solid rgba(0,0,0,0.05); }
        .modal { transition: opacity 0.25s ease; z-index: 100; }
        .input-custom { background: #f8fafc; border: 2px solid #e2e8f0; transition: all 0.3s ease; border-radius: 12px; }
        .input-custom:focus { border-color: #3b82f6; outline: none; background: white; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="sidebar hidden lg:flex flex-col p-6 overflow-y-auto">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/40">
                <i class="fas fa-gem text-white"></i>
            </div>
            <h2 class="text-white font-black text-xl tracking-tighter uppercase">Delta Lunox</h2>
        </div>
        <nav class="space-y-2 flex-grow">
            <a href="dashboard.html" class="nav-link flex items-center gap-4 p-4 text-xs font-bold uppercase tracking-widest">
                <i class="fas fa-th-large w-5"></i> Dashboard
            </a>
            <a href="admin-approval.html" class="nav-link flex items-center gap-4 p-4 text-xs font-bold uppercase tracking-widest">
                <i class="fas fa-check-circle w-5"></i> Approval
            </a>
            <a href="products.html" class="nav-link active flex items-center gap-4 p-4 text-xs font-bold uppercase tracking-widest">
                <i class="fas fa-box w-5"></i> Inventaris
            </a>
        </nav>
    </aside>

    <main class="flex-grow p-6 lg:p-10">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl lg:text-3xl font-black tracking-tight uppercase text-slate-800">Manajemen Produk</h1>
                <p class="text-slate-400 text-[11px] font-bold uppercase tracking-[0.2em]">Pusat Gudang Utama</p>
            </div>
            <button onclick="toggleModal(true)" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-blue-900/20 hover:bg-blue-700 transition">
                <i class="fas fa-plus mr-2"></i> Tambah Produk Baru
            </button>
        </header>

        <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
            <div class="flex gap-2">
                <button onclick="exportToCSV()" class="bg-emerald-500/10 text-emerald-600 px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-emerald-500 hover:text-white transition">
                    <i class="fas fa-file-export mr-2"></i> Export
                </button>
                <label class="bg-amber-500/10 text-amber-600 px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-amber-500 hover:text-white transition cursor-pointer">
                    <i class="fas fa-file-import mr-2"></i> Import CSV
                    <input type="file" id="importFile" accept=".csv" class="hidden" onchange="importCSV(this)">
                </label>
                <button onclick="downloadTemplate()" class="bg-slate-100 text-slate-500 px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-slate-200 transition">
                    <i class="fas fa-download mr-2"></i> Template
                </button>
            </div>
            <div class="relative w-full md:w-80">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                <input type="text" id="searchBox" onkeyup="filterTable()" placeholder="Scan QR atau Cari Nama Produk..." class="w-full bg-white border-none rounded-xl py-3 pl-10 pr-4 text-xs font-bold shadow-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <div class="glass-card overflow-hidden shadow-xl shadow-slate-200/50">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="p-5 text-[10px] font-black uppercase text-slate-400">Info Produk</th>
                            <th class="p-5 text-[10px] font-black uppercase text-slate-400 text-center">Stok Gudang</th>
                            <th class="p-5 text-[10px] font-black uppercase text-slate-400">Harga Beli</th>
                            <th class="p-5 text-[10px] font-black uppercase text-slate-400">Harga Jual</th>
                            <th class="p-5 text-[10px] font-black uppercase text-slate-400 text-center">Status</th>
                            <th class="p-5 text-[10px] font-black uppercase text-slate-400 text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="productTable" class="divide-y divide-slate-50 text-slate-700"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalProduct" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center">
        <div class="absolute w-full h-full bg-slate-900/60 backdrop-blur-sm" onclick="toggleModal(false)"></div>
        <div class="bg-white w-full max-w-md mx-auto rounded-3xl shadow-2xl z-50 overflow-hidden relative">
            <div class="p-8">
                <h3 id="modalTitle" class="text-xl font-black uppercase tracking-tight mb-6 text-slate-800 text-center text-blue-600">Form Master Produk</h3>
                <input type="hidden" id="edit_id">
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase block mb-1 ml-1 text-left">Nama Barang</label>
                        <input type="text" id="p_name" class="w-full input-custom p-3 text-sm font-bold" placeholder="Contoh: Coca Cola 250ml">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-black text-pink-500 uppercase block mb-1 ml-1 text-left italic">QR Code (Scan)</label>
                            <input type="text" id="p_qr" class="w-full input-custom p-3 text-sm font-bold text-pink-600 border-pink-100 uppercase" placeholder="SCAN QR DISINI">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase block mb-1 ml-1 text-left">Stok Awal (Gudang)</label>
                            <input type="number" id="p_stock" class="w-full input-custom p-3 text-sm font-bold">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase block mb-1 ml-1 text-left">Harga Beli</label>
                            <input type="number" id="p_cost" class="w-full input-custom p-3 text-sm font-bold">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-blue-500 uppercase block mb-1 ml-1 text-left">Harga Jual</label>
                            <input type="number" id="p_price" class="w-full input-custom p-3 text-sm font-bold text-blue-600">
                        </div>
                    </div>
                    <div class="flex justify-around bg-slate-50 p-3 rounded-2xl">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="p_is_selling" checked class="w-4 h-4 rounded text-emerald-500 border-slate-300">
                            <span class="text-[9px] font-black uppercase text-slate-500">Siap Jual</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="p_is_hpp" checked class="w-4 h-4 rounded text-blue-500 border-slate-300">
                            <span class="text-[9px] font-black uppercase text-slate-500">Hitung HPP</span>
                        </label>
                    </div>
                    <button onclick="saveProduct()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest mt-2 hover:bg-blue-600 transition-all shadow-lg">
                        Simpan Data Ke Gudang
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allProducts = [];

        window.onload = () => loadProducts();

        async function loadProducts() {
            const { data, error } = await supabaseClient.from('products').select('*').order('name');
            if (error) return console.error(error);
            allProducts = data;
            renderTable(data);
        }

        function renderTable(data) {
            const tbody = document.getElementById('productTable');
            tbody.innerHTML = data.map(p => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-5">
                        <div class="font-black text-xs uppercase text-slate-800">${p.name}</div>
                        <div class="text-[9px] font-bold uppercase text-pink-500 tracking-tighter"><i class="fas fa-qrcode mr-1"></i>${p.qr_code || 'BELUM ADA QR'}</div>
                    </td>
                    <td class="p-5 text-center">
                        <span class="bg-blue-50 px-3 py-1 rounded-lg text-xs font-black text-blue-600">${p.stok_gudang || 0}</span>
                    </td>
                    <td class="p-5 text-xs font-bold text-slate-500">Rp ${Number(p.cost_price || 0).toLocaleString()}</td>
                    <td class="p-5 text-xs font-black text-blue-600">Rp ${Number(p.price || 0).toLocaleString()}</td>
                    <td class="p-5 text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick="updateToggle('${p.id}', 'is_selling', ${p.is_selling})" class="w-7 h-7 rounded-full ${p.is_selling ? 'bg-emerald-500 text-white shadow-lg' : 'bg-slate-100 text-slate-300'}" title="Status Jual">
                                <i class="fas fa-shopping-cart text-[9px]"></i>
                            </button>
                            <button onclick="updateToggle('${p.id}', 'is_hpp_active', ${p.is_hpp_active})" class="w-7 h-7 rounded-full ${p.is_hpp_active ? 'bg-blue-500 text-white shadow-lg' : 'bg-slate-100 text-slate-300'}" title="Status HPP">
                                <i class="fas fa-calculator text-[9px]"></i>
                            </button>
                        </div>
                    </td>
                    <td class="p-5 text-right space-x-1">
                        <button onclick="editProduct('${p.id}')" class="w-8 h-8 rounded-lg text-blue-500 hover:bg-blue-50 transition"><i class="fas fa-edit text-xs"></i></button>
                        <button onclick="deleteProduct('${p.id}', '${p.name}')" class="w-8 h-8 rounded-lg text-red-400 hover:bg-red-50 transition"><i class="fas fa-trash text-xs"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        async function updateToggle(id, field, currentVal) {
            const { error } = await supabaseClient.from('products').update({ [field]: !currentVal }).eq('id', id);
            if (error) alert(error.message); else loadProducts();
        }

        function toggleModal(show, isEdit = false) {
            const modal = document.getElementById('modalProduct');
            document.getElementById('modalTitle').innerText = isEdit ? 'Update Produk' : 'Tambah Produk Baru';
            if (!show) resetForm();
            modal.style.opacity = show ? '1' : '0';
            modal.style.pointerEvents = show ? 'auto' : 'none';
            if (show) setTimeout(() => document.getElementById('p_qr').focus(), 300);
        }

        async function saveProduct() {
            const id = document.getElementById('edit_id').value;
            const qrValue = document.getElementById('p_qr').value;
            const stockInput = parseInt(document.getElementById('p_stock').value) || 0;

            const payload = {
                name: document.getElementById('p_name').value,
                qr_code: qrValue,
                sku: qrValue,
                stok_gudang: stockInput,
                stock: stockInput,
                cost_price: parseFloat(document.getElementById('p_cost').value) || 0,
                price: parseFloat(document.getElementById('p_price').value) || 0,
                is_selling: document.getElementById('p_is_selling').checked,
                is_hpp_active: document.getElementById('p_is_hpp').checked
            };

            if(!payload.name || !payload.qr_code) return alert("Nama dan QR Code wajib diisi!");

            const { error } = id 
                ? await supabaseClient.from('products').update(payload).eq('id', id)
                : await supabaseClient.from('products').insert([payload]);

            if (error) alert("Gagal Simpan: " + error.message);
            else { toggleModal(false); loadProducts(); }
        }

        function editProduct(id) {
            const p = allProducts.find(x => x.id === id);
            document.getElementById('edit_id').value = p.id;
            document.getElementById('p_name').value = p.name;
            document.getElementById('p_qr').value = p.qr_code;
            document.getElementById('p_stock').value = p.stok_gudang || 0;
            document.getElementById('p_cost').value = p.cost_price || 0;
            document.getElementById('p_price').value = p.price || 0;
            document.getElementById('p_is_selling').checked = p.is_selling;
            document.getElementById('p_is_hpp').checked = p.is_hpp_active;
            toggleModal(true, true);
        }

        async function deleteProduct(id, name) {
            if (confirm(`Hapus permanen produk ${name}?`)) {
                await supabaseClient.from('products').delete().eq('id', id);
                loadProducts();
            }
        }

        function filterTable() {
            const q = document.getElementById('searchBox').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(q) || 
                (p.qr_code && p.qr_code.toLowerCase().includes(q))
            );
            renderTable(filtered);
        }

        // FUNGSI DOWNLOAD TEMPLATE CSV
        function downloadTemplate() {
            const headers = ["name", "qr_code", "stok_gudang", "cost_price", "price", "is_selling", "is_hpp_active"];
            const exampleData = "Indomie Goreng,8998866200234,100,2800,3500,TRUE,TRUE";
            const csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + exampleData;
            const link = document.createElement("a");
            link.href = encodeURI(csvContent);
            link.download = "template_import_gudang.csv";
            link.click();
        }

        function exportToCSV() {
            const headers = ["name", "qr_code", "stok_gudang", "cost_price", "price", "is_selling", "is_hpp_active"];
            const rows = allProducts.map(p => [p.name, p.qr_code, p.stok_gudang, p.cost_price, p.price, p.is_selling, p.is_hpp_active].join(","));
            const csv = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.join("\n");
            const link = document.createElement("a");
            link.href = encodeURI(csv); link.download = "master_produk_delta.csv";
            link.click();
        }

        async function importCSV(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const lines = e.target.result.split("\n");
                const items = [];
                for (let i = 1; i < lines.length; i++) {
                    const col = lines[i].split(",");
                    if (col.length < 2) continue;
                    const stockVal = parseInt(col[2]) || 0;
                    items.push({
                        name: col[0].trim(), 
                        qr_code: col[1].trim(), 
                        sku: col[1].trim(), 
                        stok_gudang: stockVal, 
                        stock: stockVal,
                        cost_price: parseFloat(col[3]) || 0, 
                        price: parseFloat(col[4]) || 0,
                        is_selling: (col[5]?.trim().toUpperCase() === 'TRUE'),
                        is_hpp_active: (col[6]?.trim().toUpperCase() === 'TRUE')
                    });
                }
                const { error } = await supabaseClient.from('products').insert(items);
                if (error) alert("Error Import: " + error.message); 
                else { alert("Import Berhasil ke Gudang Utama!"); loadProducts(); }
            };
            reader.readAsText(file);
        }

        function resetForm() {
            document.getElementById('edit_id').value = '';
            document.getElementById('p_is_selling').checked = true;
            document.getElementById('p_is_hpp').checked = true;
            document.querySelectorAll('.input-custom').forEach(i => i.value = '');
        }
    </script>
</body>
</html>
