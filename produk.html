<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Lunox | Inventaris 📦</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script> 
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .sidebar { transition: all 0.3s; width: 280px; background: #0f172a; flex-shrink: 0; }
        .nav-link { transition: all 0.2s; color: #94a3b8; border-radius: 15px; }
        .nav-link:hover, .nav-link.active { background: #1e293b; color: white; }
        
        .card-input { background: white; border-radius: 30px; border: 1px solid rgba(0,0,0,0.05); }
        .input-custom { 
            background: #f8fafc; 
            border: 2px solid #e2e8f0; 
            transition: all 0.3s ease;
        }
        .input-custom:focus { 
            border-color: #3b82f6; 
            background: white; 
            outline: none; 
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="sidebar hidden lg:flex flex-col p-6 overflow-y-auto">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/40">
                <i class="fas fa-gem text-white"></i>
            </div>
            <h2 class="text-white font-black text-xl tracking-tighter uppercase">Delta Lunox</h2>
        </div>

        <nav class="space-y-2 flex-grow">
            <a href="dashboard.html" class="nav-link flex items-center gap-4 p-4 text-xs font-bold uppercase tracking-widest">
                <i class="fas fa-th-large w-5"></i> Dashboard
            </a>
            <a href="admin-approval.html" class="nav-link flex items-center gap-4 p-4 text-xs font-bold uppercase tracking-widest">
                <i class="fas fa-check-circle w-5"></i> Approval
                <span id="badge-pending" class="ml-auto bg-pink-600 text-[8px] text-white px-2 py-1 rounded-full hidden">0</span>
            </a>
            <a href="gudang-scan.html" class="nav-link flex items-center gap-4 p-4 text-xs font-bold uppercase tracking-widest">
                <i class="fas fa-exchange-alt w-5"></i> Transfer Stok
            </a>
            <a href="kasir.html" class="nav-link flex items-center gap-4 p-4 text-xs font-bold uppercase tracking-widest">
                <i class="fas fa-cash-register w-5"></i> Kasir POS
            </a>
            <div class="pt-4 pb-2 text-[10px] font-black text-slate-600 uppercase tracking-widest px-4">Master Data</div>
            <a href="products.html" class="nav-link active flex items-center gap-4 p-4 text-xs font-bold uppercase tracking-widest">
                <i class="fas fa-box w-5"></i> Inventaris
            </a>
        </nav>

        <div class="mt-auto pt-6 border-t border-slate-800 px-2">
            <p class="text-[9px] font-bold text-slate-500 uppercase">Current User</p>
            <p class="text-xs font-black text-white uppercase mt-1 text-left">Sys Admin</p>
        </div>
    </aside>

    <main class="flex-grow p-6 lg:p-10">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl lg:text-3xl font-black tracking-tight uppercase">Manajemen Produk</h1>
                <p class="text-slate-400 text-[11px] font-bold uppercase tracking-[0.2em]">Input & Update Database Produk</p>
            </div>
            <div id="conn-status" class="flex items-center gap-3 bg-white px-4 py-2 rounded-full shadow-sm">
                <div class="w-2 h-2 rounded-full bg-slate-300"></div>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Supabase</span>
            </div>
        </header>

        <div class="max-w-2xl">
            <div class="card-input p-8 shadow-xl shadow-slate-200/50">
                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1 text-left">Nama Barang</label>
                        <input type="text" id="p_name" placeholder="Masukkan nama barang..." 
                            class="w-full input-custom p-4 rounded-2xl text-sm font-semibold text-slate-700">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1 text-left">SKU Code</label>
                            <input type="text" id="p_sku" placeholder="SKU-001" 
                                class="w-full input-custom p-4 rounded-2xl text-sm font-semibold uppercase">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1 text-left">QR String (Scanner)</label>
                            <input type="text" id="p_qr" placeholder="KODE QR" 
                                class="w-full input-custom p-4 rounded-2xl text-sm font-bold text-pink-600">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1 text-left text-left">Harga Jual (Rp)</label>
                            <input type="number" id="p_price" placeholder="0" 
                                class="w-full input-custom p-4 rounded-2xl text-sm font-semibold">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1 text-left">Stok Awal Gudang</label>
                            <input type="number" id="p_stock" placeholder="0" 
                                class="w-full input-custom p-4 rounded-2xl text-sm font-semibold">
                        </div>
                    </div>

                    <div class="pt-4">
                        <button onclick="saveProduct()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-[0.2em] shadow-lg shadow-slate-300 hover:bg-slate-800 transition-all active:scale-95">
                            Simpan ke Database <i class="fas fa-check-circle ml-2"></i>
                        </button>
                        
                        <div class="flex justify-center mt-6">
                            <button onclick="resetForm()" class="text-[10px] font-black text-red-400 uppercase tracking-widest hover:text-red-600 transition">
                                <i class="fas fa-trash-alt mr-1"></i> Kosongkan Form
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Cek koneksi & Update Badge
        window.onload = async () => {
            const statusDiv = document.querySelector('#conn-status div');
            const statusText = document.querySelector('#conn-status span');
            
            if (typeof supabaseClient !== 'undefined') {
                statusDiv.classList.replace('bg-slate-300', 'bg-green-500');
                statusText.innerText = "Connected";
                checkPendingApprovals();
            } else {
                statusDiv.classList.replace('bg-slate-300', 'bg-red-500');
                statusText.innerText = "Offline";
            }
        };

        async function checkPendingApprovals() {
            const { count } = await supabaseClient
                .from('stock_transfers')
                .select('*', { count: 'exact', head: true })
                .eq('status', 'pending');

            const badge = document.getElementById('badge-pending');
            if (count > 0) {
                badge.innerText = count;
                badge.classList.remove('hidden');
            }
        }

        async function saveProduct() {
            const name = document.getElementById('p_name').value;
            const sku = document.getElementById('p_sku').value;
            const qr = document.getElementById('p_qr').value;
            const price = parseFloat(document.getElementById('p_price').value) || 0;
            const stock = parseInt(document.getElementById('p_stock').value) || 0;

            if (!name || !qr) return alert("Nama Barang dan Kode QR wajib diisi!");

            try {
                const { error } = await supabaseClient
                    .from('products')
                    .insert([{
                        name: name,
                        sku: sku,
                        qr_code: qr,
                        price: price,
                        stok_gudang: stock // Menggunakan nama kolom sesuai schema
                    }]);

                if (error) throw error;

                alert("Produk '" + name + "' Berhasil Disimpan!");
                resetForm();
                
            } catch (err) {
                alert("Gagal: " + err.message);
                console.error(err);
            }
        }

        function resetForm() {
            document.querySelectorAll('input').forEach(input => input.value = "");
            document.getElementById('p_name').focus();
        }
    </script>
</body>
</html>
