<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory System - In/Out/Mutasi</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800">Inventory Management</h1>
                <p class="text-slate-500 text-sm">Sistem Mutasi Barang Real-Time</p>
            </div>
            <div class="flex gap-2">
                <button onclick="location.reload()" class="bg-white border border-slate-300 p-2 rounded-lg hover:bg-slate-50">
                    <i data-lucide="refresh-cw" class="w-5 h-5 text-slate-600"></i>
                </button>
                <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-indigo-700 flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> Tambah Barang
                </button>
            </div>
        </div>

        <!-- Form Input Cepat untuk Staf -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8 border border-slate-200">
            <h2 class="text-lg font-bold text-slate-700 mb-4">Input Mutasi Harian</h2>
            <form class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Nama Barang</label>
                    <select class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option>CHIVAS REGAL 12 YO 700ML</option>
                        <option>JOHNNIE WALKER BLACK 75 CL</option>
                        <option>HENDRIKS GIN 700ML</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Tipe Mutasi</label>
                    <select class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="out">OUT (Keluar)</option>
                        <option value="in">IN (Masuk)</option>
                        <option value="mutation">MUTASI</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Jumlah</label>
                    <input type="number" step="0.01" placeholder="0.00" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="flex items-end">
                    <button type="button" class="w-full bg-slate-800 text-white p-2.5 rounded-lg font-bold hover:bg-slate-900 transition-colors">
                        Simpan Data
                    </button>
                </div>
            </form>
        </div>

        <!-- Tabel Monitoring (Mirap Format Excel Anda) -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800 text-white text-xs uppercase tracking-wider">
                        <tr>
                            <th class="p-4 border-b border-slate-700">Nama Miras</th>
                            <th class="p-4 border-b border-slate-700">Stock Awal</th>
                            <th class="p-4 border-b border-slate-700 bg-green-900/30 text-green-400">In</th>
                            <th class="p-4 border-b border-slate-700 bg-blue-900/30 text-blue-400">Mutasi</th>
                            <th class="p-4 border-b border-slate-700 bg-red-900/30 text-red-400">Out</th>
                            <th class="p-4 border-b border-slate-700 text-yellow-400">Saldo Akhir</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm text-slate-600 divide-y divide-slate-100">
                        <!-- Baris 1 -->
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="p-4 font-semibold text-slate-800">CHIVAS REGAL 12 YO 700ML</td>
                            <td class="p-4">1.00</td>
                            <td class="p-4 font-bold text-green-600">2.00</td>
                            <td class="p-4 text-blue-600">1.00</td>
                            <td class="p-4 text-red-600">0.50</td>
                            <td class="p-4 font-black text-slate-900 bg-yellow-50">1.50</td>
                        </tr>
                        <!-- Baris 2 -->
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="p-4 font-semibold text-slate-800">HENDRIKS GIN 700ML</td>
                            <td class="p-4">0.55</td>
                            <td class="p-4 font-bold text-green-600">0.00</td>
                            <td class="p-4 text-blue-600">0.00</td>
                            <td class="p-4 text-red-600">0.15</td>
                            <td class="p-4 font-black text-slate-900 bg-yellow-50">0.40</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Inisialisasi Ikon Lucide
        lucide.createIcons();
    </script>
</body>
</html>
